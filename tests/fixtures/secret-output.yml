---
- name: Render a sentinel through the production secret-output controls
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    sentinel_value: CODEX_SECRET_SENTINEL_9f4c7d2a
  tasks:
    - name: Render fixture secret
      ansible.builtin.template:
        src: secret.env.j2
        dest: "{{ fixture_output_dir }}/secret.env"
        mode: "0600"
      no_log: true
      diff: false
