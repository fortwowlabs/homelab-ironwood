---
- name: Render sentinels through the production secret templates and controls
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    sentinel_value: CODEX_SECRET_SENTINEL_9f4c7d2a
    ntfy_url: https://fixture.invalid
    ntfy_topic: fixture
    vault_ntfy_token: "{{ sentinel_value }}"
    vault_mullvad_privkey: "{{ sentinel_value }}"
    vault_mullvad_peer_pubkey: "{{ sentinel_value }}"
    vault_mullvad_endpoint_ip: 192.0.2.10
    vault_mullvad_endpoint_port: 51820
    vault_mullvad_wg_addr: "{{ sentinel_value }}"
    vault_romm_db_password: "{{ sentinel_value }}"
    vault_romm_db_root_password: "{{ sentinel_value }}"
    vault_romm_auth_secret_key: "{{ sentinel_value }}"
    vault_romm_igdb_client_id: "{{ sentinel_value }}"
    vault_romm_igdb_client_secret: "{{ sentinel_value }}"
    vault_screenscraper_user: "{{ sentinel_value }}"
    vault_screenscraper_password: "{{ sentinel_value }}"
    vault_steamgriddb_api_key: "{{ sentinel_value }}"
    vault_mobygames_api_key: "{{ sentinel_value }}"
    vault_retroachievements_api_key: "{{ sentinel_value }}"
  tasks:
    - name: Render each production secret template
      ansible.builtin.template:
        src: "../../{{ item.src }}"
        dest: "{{ fixture_output_dir }}/{{ item.dest }}"
        mode: "0600"
      loop:
        - src: roles/svc_download/templates/peer.conf.j2
          dest: peer.conf
        - src: roles/svc_download/templates/vpn-netns.env.j2
          dest: vpn-netns.env
        - src: roles/service_vm/templates/notify.env.j2
          dest: notify.env
        - src: roles/svc_media/templates/romm.env.j2
          dest: romm.env
        - src: roles/svc_media/templates/romm-db.env.j2
          dest: romm-db.env
      no_log: true
      diff: false
