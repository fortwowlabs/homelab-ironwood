[defaults]
inventory              = inventory/hosts.yml
roles_path             = roles
collections_path       = collections
host_key_checking      = True
retry_files_enabled    = False
# community.general's `yaml` callback was removed in v12; the built-in
# default callback grew an equivalent result_format option instead.
stdout_callback        = default
callback_result_format = yaml
callbacks_enabled      = profile_tasks, timer
interpreter_python     = auto_silent
# Vault password: either pass --ask-vault-pass, or drop the passphrase in a
# file and point to it here (chmod 600, .gitignored):
# vault_password_file  = .vault_pass

[ssh_connection]
pipelining             = True
# Keepalives: nft ruleset loads on the jail can sever the established
# session; without these the worker hangs on TCP retries instead of failing.
ssh_args               = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=4
