---
name: Validate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-validation:
    name: Offline validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # Defense in depth: every Ansible parser in this job sees loopback-only
      # fixtures even if a tool omits its explicit --inventory argument.
      ANSIBLE_INVENTORY: tests/fixtures/inventory.yml
      ANSIBLE_LOCAL_TEMP: ${{ github.workspace }}/.ansible/tmp
    steps:
      - name: Check out the proposed change
        uses: actions/checkout@v4
        with:
          # Full history is required by tests/scan_history_secrets.py.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install ShellCheck
        run: sudo apt-get install --yes shellcheck

      - name: Install pinned dependencies
        run: make deps-dev

      - name: Run fixture-only validation
        run: make validate
