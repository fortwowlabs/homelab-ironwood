---
# ============================================================================
# site.yml — full unattended deploy. Run from the MBP:
#     ansible-playbook site.yml --ask-vault-pass
# Use the Make targets documented in README.md for deployment, scoped
# convergence, safe verification, disruptive verification, and drift checks.
#
# Ordering is: provision all VMs (API) -> shared guest gates/packages/NFS ->
# configure download + infra (jail is the critical path; infra's Caddy
# backends must be up before media verifies them) -> monitoring -> configure
# media (verifies every service's Caddy backend last).
# A failure anywhere posts to ntfy and stops (rescue tasks are tagged
# `always` so alerting fires even on tag-sliced runs). Success posts a green
# ntfy at the end of FULL runs only.
#
# PREREQUISITES (one-time, NOT automated — see docs/deployment.md):
#   - TrueNAS Phase 1 done (homelab uid 10001, media+backups datasets, NFS
#     exports restricted to .30/.31/.32, IP pinned, encryption auto-unlock
#     tested — .32 (svc-infra) is a v6 addition, add it to the existing
#     allowlist if it predates this VM)
#   - PVE pool `homelab-svc` + scoped API token created; vault filled
#   - Mullvad configs generated; vault filled
#   - admin_ssh_pubkey set in inventory/group_vars/all/main.yml
#   - vault_romm_* filled (RomM DB + optional metadata keys)
# After deploy, complete the DNS and Caddy CA steps in docs/deployment.md.
# ============================================================================

# ---------- Phase 3 & 5: provision both VMs via the PVE API ----------
- name: Provision service VMs
  hosts: pve
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Provision block
      block:
        - name: Create + boot each service VM
          ansible.builtin.include_role:
            name: pve_vm
            apply:
              tags: [provision]
          tags: [always]
          vars:
            vm_id:      "{{ hostvars[item].vm_id }}"
            vm_name:    "{{ item }}"
            vm_cores:   "{{ hostvars[item].vm_cores }}"
            vm_memory:  "{{ hostvars[item].vm_memory }}"
            vm_disk_gb: "{{ hostvars[item].vm_disk_gb }}"
            vm_startup: "{{ hostvars[item].vm_startup }}"
          loop: "{{ groups['service_vms'] }}"
      # If provisioning fails, tell me and stop before touching guests.
      rescue:
        - name: Notify provisioning failure
          ansible.builtin.include_role:
            name: notify
            apply:
              tags: [always]
          tags: [always]
          vars:
            ntfy_title: "homelab deploy FAILED (provisioning)"
            ntfy_result: "VM provisioning failed on the PVE API step. Nothing configured yet."
            ntfy_priority: "high"
            ntfy_tags: "rotating_light"
        - name: Abort
          ansible.builtin.fail:
            msg: "Provisioning failed — see above."
          tags: [always]

# ---------- Shared guest bootstrap, packages and NFS ----------
- name: Prepare service VMs
  hosts: service_vms
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Prepare service VM block
      block:
        - name: Run shared service VM role
          ansible.builtin.include_role:
            name: service_vm
          tags: [always]
      rescue:
        - name: Notify shared guest preparation failure
          ansible.builtin.include_role:
            name: notify
            apply:
              tags: [always]
          tags: [always]
          vars:
            ntfy_title: "homelab deploy FAILED ({{ inventory_hostname }})"
            ntfy_result: "Shared package, identity, or NFS preparation failed."
            ntfy_priority: high
            ntfy_tags: rotating_light
        - name: Abort shared guest preparation
          ansible.builtin.fail:
            msg: "service VM preparation failed on {{ inventory_hostname }}"
          tags: [always]

# ---------- Phase 4: the jail (critical path) ----------
- name: Configure the download VM (netns jail + stack)
  hosts: download_vms
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - block:
        - ansible.builtin.include_role:
            name: svc_download
          tags: [always]
      rescue:
        - name: Notify jail/stack failure
          ansible.builtin.include_role:
            name: notify
            apply:
              tags: [always]
          tags: [always]
          vars:
            ntfy_title: "homelab deploy FAILED ({{ inventory_hostname }})"
            ntfy_result: >-
              {{ inventory_hostname }} configuration failed. NO real download
              traffic has flowed (gates block it). Check the failed task above.
            ntfy_priority: "high"
            ntfy_tags: "rotating_light"
        - ansible.builtin.fail:
            msg: "{{ inventory_hostname }} failed — see above."
          tags: [always]

# ---------- Phase 7: infra (v6) ----------
# Runs before Monitoring/media, same reason as download: svc-media's verify
# smoke-tests every configured Caddy backend, including infra services, so
# they must already be up when that runs.
- name: Configure the infra VM (rootless infra stack)
  hosts: infra_vms
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - block:
        - ansible.builtin.include_role:
            name: svc_infra
          tags: [always]
      rescue:
        - name: Notify infra failure
          ansible.builtin.include_role:
            name: notify
            apply:
              tags: [always]
          tags: [always]
          vars:
            ntfy_title: "homelab deploy: {{ inventory_hostname }} FAILED"
            ntfy_result: "{{ inventory_hostname }} configuration failed."
            ntfy_priority: "high"
            ntfy_tags: "warning"
        - ansible.builtin.fail:
            msg: "{{ inventory_hostname }} failed — see above."
          tags: [always]

# Cockpit must answer before svc-media verifies every configured Caddy backend.
- name: Monitoring (Cockpit + disk alarm on all VMs)
  hosts: service_vms
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - name: Configure monitoring
      block:
        - name: Run monitoring role
          ansible.builtin.include_role:
            name: mon
            apply:
              tags: [mon]
          tags: [always]
      rescue:
        - name: Notify monitoring failure
          ansible.builtin.include_role:
            name: notify
            apply:
              tags: [always]
          tags: [always]
          vars:
            ntfy_title: "homelab deploy FAILED (monitoring)"
            ntfy_result: "Monitoring configuration failed on {{ inventory_hostname }}."
            ntfy_priority: high
            ntfy_tags: rotating_light
        - name: Abort after monitoring failure
          ansible.builtin.fail:
            msg: "monitoring failed on {{ inventory_hostname }}"
          tags: [always]

# ---------- Phase 5-6: media ----------
- name: Configure the media VM (rootless media stack)
  hosts: media_vms
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - block:
        - ansible.builtin.include_role:
            name: svc_media
          tags: [always]
      rescue:
        - name: Notify media failure
          ansible.builtin.include_role:
            name: notify
            apply:
              tags: [always]
          tags: [always]
          vars:
            ntfy_title: "homelab deploy: {{ inventory_hostname }} FAILED"
            ntfy_result: "{{ inventory_hostname }} configuration failed, but the jail is up and verified."
            ntfy_priority: "high"
            ntfy_tags: "warning"
        - ansible.builtin.fail:
            msg: "{{ inventory_hostname }} failed — see above."
          tags: [always]

# ---------- Success notification (full runs only — deliberately untagged,
# ---------- so tag-sliced runs don't claim a full deploy succeeded) ----------
- name: Announce success
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert every deployment phase completed
      ansible.builtin.assert:
        that:
          - hostvars[download_host].svc_download_verified | default(false) | bool
          - hostvars[media_host].svc_media_verified | default(false) | bool
          - hostvars[infra_host].svc_infra_verified | default(false) | bool
          - hostvars[download_host].service_vm_verified | default(false) | bool
          - hostvars[media_host].service_vm_verified | default(false) | bool
          - hostvars[infra_host].service_vm_verified | default(false) | bool
          - hostvars[download_host].mon_verified | default(false) | bool
          - hostvars[media_host].mon_verified | default(false) | bool
          - hostvars[infra_host].mon_verified | default(false) | bool
        fail_msg: "Refusing to send success: one or more deployment phases did not verify."
      when: not ansible_check_mode

    - name: Green ntfy
      ansible.builtin.include_role:
        name: notify
      vars:
        ntfy_title: "homelab deploy OK"
        ntfy_result: >-
          All service VMs converged and passed non-disruptive verification:
          catalog containers are in the VPN namespace, Mullvad and the canary
          are green, NFS probes cleaned up, and media/infra/Caddy services
          answer. Run make verify-disruptive explicitly during a maintenance
          window.
        ntfy_priority: "default"
        ntfy_tags: "white_check_mark"
      when: not ansible_check_mode
