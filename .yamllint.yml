---
extends: default

ignore: |
  .ansible/
  .venv/
  collections/

rules:
  braces:
    max-spaces-inside: 1
  # Inventory and module arguments use deliberate column alignment.
  colons: disable
  commas: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start: disable
  empty-lines:
    max-end: 1
  line-length:
    max: 180
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
