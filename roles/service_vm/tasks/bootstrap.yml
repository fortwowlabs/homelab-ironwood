---
- name: Wait for cloud-init to finish cleanly
  ansible.builtin.command: cloud-init status --wait --long
  check_mode: false
  register: service_vm_cloud_init
  changed_when: false
  failed_when: "'status: done' not in service_vm_cloud_init.stdout"

- name: Read service identity
  ansible.builtin.command: id homelab
  check_mode: false
  register: service_vm_identity
  changed_when: false

- name: Read SELinux mode
  ansible.builtin.command: getenforce
  check_mode: false
  register: service_vm_selinux
  changed_when: false

- name: Verify subordinate ID mappings required by rootless containers
  ansible.builtin.shell: |
    set -o pipefail
    grep -q '^homelab:' /etc/subuid
    grep -q '^homelab:' /etc/subgid
  args:
    executable: /bin/bash
  changed_when: false
  check_mode: false
  when: service_requires_subids | bool

- name: Assert service identity and SELinux mode
  ansible.builtin.assert:
    that:
      - "('uid=' ~ svc_uid | string) in service_vm_identity.stdout"
      - "('gid=' ~ svc_gid | string) in service_vm_identity.stdout"
      - service_vm_selinux.stdout == 'Enforcing'
