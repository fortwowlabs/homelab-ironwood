---
- name: Verify bootstrap identity and SELinux
  ansible.builtin.import_tasks: bootstrap.yml

- name: Check NFS mounts are active
  ansible.builtin.command: "findmnt -n -t nfs4 -M {{ item.path }}"
  loop: "{{ service_nfs_mounts }}"
  changed_when: false

- name: Verify every NFS mount is writable with guaranteed cleanup
  block:
    - name: Create temporary NFS probe as the service UID
      ansible.builtin.command:
        argv:
          - setpriv
          - "--reuid={{ svc_uid }}"
          - "--regid={{ svc_gid }}"
          - --clear-groups
          - --
          - touch
          - "{{ item.path }}/.homelab-verify-{{ inventory_hostname }}"
      loop: "{{ service_nfs_mounts }}"
      loop_control:
        label: "{{ item.path }}"
      changed_when: false
  always:
    - name: Remove temporary NFS probe as the service UID
      ansible.builtin.command:
        argv:
          - setpriv
          - "--reuid={{ svc_uid }}"
          - "--regid={{ svc_gid }}"
          - --clear-groups
          - --
          - rm
          - -f
          - "{{ item.path }}/.homelab-verify-{{ inventory_hostname }}"
      loop: "{{ service_nfs_mounts }}"
      loop_control:
        label: "{{ item.path }}"
      changed_when: false

- name: Mark shared VM verification complete
  ansible.builtin.set_fact:
    service_vm_verified: true
