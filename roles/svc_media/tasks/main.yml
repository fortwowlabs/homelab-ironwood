---
# ============================================================================
# svc_media — rootless media stack (homelab uid 10001, user-scope systemd).
# Mirrors DEPLOY.md Phases 5-6. Tags:
#   files | nfs | media | access | backup | verify
#
# v5 changes:
#   - v6: svc-media no longer runs Tailscale (remote access is via a
#     dedicated subnet-router VM). Caddy serves *.fort.wow hostname vhosts
#     on the LAN IP with an internal CA — reached identically on LAN and
#     tailnet (the subnet router advertises 192.168.1.0/24).
#   - Jellyfin publishes on the LAN IP only + firewalld rich rule scoped to
#     lan_cidr.
#   - romm-db.env required alongside romm.env (secret split).
#   - Container-level NFS probes: prove each container SEES its media, not
#     just that the host mounted something.
#   - Nightly backup timer (RomM DB dump + appdata tars).
# ============================================================================

# ---------------------------------------------------------------- packages ---
- name: EPEL first (caddy lives there)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  tags: [files]

- name: Install stack packages (cloud-init also tries; this is authoritative)
  ansible.builtin.dnf:
    name:
      - podman
      - nfs-utils
      - policycoreutils-python-utils
      - firewalld          # svc-media's firewall; GenericCloud ships without it
      - python3-firewall   # firewalld ansible module bindings (not in cloud image)
      - curl
      - bind-utils         # dig, for the DNS gate
      - cockpit
      - cockpit-podman
      - cockpit-storaged
    state: present
  tags: [files]

- name: "GATE: rootless subuid/subgid ranges exist for homelab"
  ansible.builtin.shell: "grep '^homelab:' /etc/subuid && grep '^homelab:' /etc/subgid"
  changed_when: false
  tags: [files, verify]

# --------------------------------------------------------------------- nfs ---
- name: Ensure NFS mountpoints exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: [/srv/media, /srv/backups]
  tags: [nfs]

- name: Allow containers on NFS
  ansible.posix.seboolean:
    name: virt_use_nfs
    state: true
    persistent: true
  tags: [nfs, files]

- name: Mount media + backups over NFSv4
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ truenas_ip }}:{{ item.export }}"
    fstype: nfs4
    opts: "{{ nfs_opts }}"
    state: mounted
  loop:
    - { path: /srv/media,   export: "{{ nfs_media_export }}" }
    - { path: /srv/backups, export: "{{ nfs_backups_export }}" }
  tags: [nfs]

- name: Prove NFS writable as service uid
  ansible.builtin.command:
# setpriv, not runuser: runuser -u wants a username and rejects '#uid'.
    cmd: "setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups -- touch /srv/media/.probe-media"
  changed_when: false
  tags: [nfs, verify]

# As the service uid, like the probe — root gets squashed and can't unlink.
- name: Clean probe
  ansible.builtin.command:
    cmd: "setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups -- rm -f /srv/media/.probe-media"
  changed_when: false
  tags: [nfs, verify]

- name: Backup subtree on NFS (created as 10001 so root-squash is moot)
  ansible.builtin.command:
    cmd: >-
      setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups -- mkdir -p
      /srv/backups/audiobookshelf
      /srv/backups/svc-media/romm-db
      /srv/backups/svc-media/appdata
  changed_when: false
  tags: [nfs, files, backup]

# ------------------------------------------------------------------- files ---
- name: Ensure linger for homelab (cloud-init tries this; confirm)
  ansible.builtin.command:
    cmd: loginctl enable-linger homelab
  changed_when: false
  tags: [files]

- name: Create rootless quadlet + appdata tree (owned 10001)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  loop:
    - /opt/homelab/.config/containers/systemd
    - /opt/homelab/appdata/jellyfin/config
    - /opt/homelab/appdata/jellyfin/cache
    - /opt/homelab/appdata/audiobookshelf/config
    - /opt/homelab/appdata/audiobookshelf/metadata
    - /opt/homelab/appdata/seerr
    - /opt/homelab/appdata/romm/resources
    - /opt/homelab/appdata/romm/assets
    - /opt/homelab/appdata/romm/config
    - /opt/homelab/appdata/romm/redis-data    # embedded Valkey state (upstream layout)
    - /opt/homelab/appdata/romm/mysql
    - /opt/homelab/appdata/homepage           # dashboard config (templated below)
    - /opt/homelab/appdata/ntfy/cache          # ntfy message cache
    - /opt/homelab/appdata/ntfy/etc            # ntfy server.yml (optional)
  tags: [files]

- name: Install rootless quadlets (static)
  ansible.builtin.copy:
    src: "quadlets/{{ item }}"
    dest: "/opt/homelab/.config/containers/systemd/{{ item }}"
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  loop:
    - audiobookshelf.container
    - seerr.container
    - romm.container
    - romm-db.container
    - romm.network
    - ntfy.container
  tags: [files, media]

- name: Render jellyfin quadlet (LAN-IP publish)
  ansible.builtin.template:
    src: jellyfin.container.j2
    dest: /opt/homelab/.config/containers/systemd/jellyfin.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  tags: [files, media]

- name: Render Homepage quadlet (needs domain for ALLOWED_HOSTS)
  ansible.builtin.template:
    src: homepage.container.j2
    dest: /opt/homelab/.config/containers/systemd/homepage.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  tags: [files, mon]

- name: Render Homepage config (services/settings/widgets/bookmarks from caddy_services)
  ansible.builtin.template:
    src: "homepage/{{ item }}.j2"
    dest: "/opt/homelab/appdata/homepage/{{ item }}"
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  loop:
    - services.yaml
    - settings.yaml
    - widgets.yaml
    - bookmarks.yaml
  tags: [files, mon]

- name: Render backup script
  ansible.builtin.template:
    src: backup-media.sh.j2
    dest: /usr/local/sbin/backup-media.sh
    mode: "0755"    # runs as homelab, not root
  tags: [files, backup]

- name: Install backup units
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop: [backup-media.service, backup-media.timer]
  tags: [files, backup]

# ------------------------------------------------------- secrets (from vault) --
# v6: romm.env + romm-db.env are now IaC — rendered from the vault so metadata
# provider keys are managed, not hand-edited on the box. If you're adopting an
# already-initialised DB, set vault_romm_db_password to the CURRENT value or
# reset the mysql dir (no ROM data is lost — see docs/media.md).
- name: Require the RomM DB + auth secrets in the vault
  ansible.builtin.assert:
    that:
      - (vault_romm_db_password | default('')) | length > 0
      - (vault_romm_db_root_password | default('')) | length > 0
      - (vault_romm_auth_secret_key | default('')) | length >= 32
    fail_msg: >-
      Set vault_romm_db_password, vault_romm_db_root_password, and
      vault_romm_auth_secret_key (>=32 chars, `openssl rand -hex 32`) in the
      vault. Metadata-provider keys (IGDB/ScreenScraper/…) are optional.
  tags: [media]

- name: Render romm.env + romm-db.env from the vault (0600, uid 10001)
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/opt/homelab/appdata/romm/{{ item }}"
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0600"
  loop: [romm.env, romm-db.env]
  no_log: true
  tags: [media]

# -------------------------------------------------------------------- media --
# Retire Jellyseerr (replaced by Seerr). Stop the old unit + remove its quadlet
# so the reload below drops the generated service; then delete the container.
# Harmless no-op on a fresh install (nothing named jellyseerr).
- name: Stop the old jellyseerr user service
  ansible.builtin.command:
    cmd: "systemctl --user -M homelab@ stop jellyseerr.service"
  failed_when: false
  changed_when: true
  tags: [media]

- name: Remove the old jellyseerr quadlet
  ansible.builtin.file:
    path: /opt/homelab/.config/containers/systemd/jellyseerr.container
    state: absent
  tags: [media]

- name: Remove the old jellyseerr container if it lingers
  ansible.builtin.command:
    cmd: "runuser -u homelab -- env XDG_RUNTIME_DIR=/run/user/{{ svc_uid }} podman rm -f jellyseerr"
    chdir: /tmp
  failed_when: false
  changed_when: true
  tags: [media]

- name: Reload the homelab user systemd scope
  ansible.builtin.command:
    cmd: systemctl --user -M homelab@ daemon-reload
  changed_when: true
  tags: [media]

- name: Start media containers (rootless; romm waits on healthy DB)
  ansible.builtin.command:
    cmd: "systemctl --user -M homelab@ start {{ item }}"
  loop: [jellyfin, audiobookshelf, romm-db, romm, seerr, ntfy, homepage]
  changed_when: true
  tags: [media]

# Running before the rich rules: the firewalld module needs the daemon up
# (zone ops fail with INVALID_ZONE otherwise). Default zone permits ssh.
- name: Enable + start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  tags: [media]

- name: Open ntfy 8080 + Homepage path to the LAN (ntfy is the alert sink)
  ansible.posix.firewalld:
    rich_rule: "rule family=ipv4 source address={{ lan_cidr }} port port=8080 protocol=tcp accept"
    permanent: true
    immediate: true
    state: enabled
  tags: [media, mon]

- name: "Open Jellyfin 8096 to the LAN source range only (v5 rich rule)"
  ansible.posix.firewalld:
    rich_rule: "rule family=ipv4 source address={{ lan_cidr }} port port=8096 protocol=tcp accept"
    permanent: true
    immediate: true
    state: enabled
  tags: [media]

- name: Remove the v4 unscoped 8096 opening if upgrading
  ansible.posix.firewalld:
    port: 8096/tcp
    permanent: true
    immediate: true
    state: disabled
  tags: [media]

# --------------------------------------------------------------------- dns ---
# NOTE (v6): svc-media no longer runs Tailscale. Remote access is via the
# dedicated subnet-router VM on thurgadin's network (it advertises
# 192.168.1.0/24), so the tailnet reaches svc-media's LAN IP directly and
# Caddy serves *.fort.wow the same way on LAN and tailnet. Nothing here
# depends on a tailnet identity anymore.
# svc-media is the authority for *.{{ service_domain }}. pfSense forwards the
# domain here and Tailscale split-DNS points the tailnet here (both one-time,
# docs/dns-and-names.md). Records come from the same caddy_services dict.
- name: Install dnsmasq
  ansible.builtin.dnf:
    name: dnsmasq
    state: present
  tags: [dns]

- name: Ensure dnsmasq loads /etc/dnsmasq.d
  ansible.builtin.lineinfile:
    path: /etc/dnsmasq.conf
    line: "conf-dir=/etc/dnsmasq.d/,*.conf"
    regexp: '^\s*#?\s*conf-dir=/etc/dnsmasq\.d'
    create: true
    mode: "0644"
  tags: [dns]

- name: Render the {{ service_domain }} zone
  ansible.builtin.template:
    src: dnsmasq-fortwow.conf.j2
    dest: /etc/dnsmasq.d/fort-wow.conf
    mode: "0644"
    validate: "dnsmasq --test --conf-file=%s"
  register: dnsmasq_zone
  tags: [dns]

- name: Open DNS 53 (udp+tcp) to the LAN source range
  ansible.posix.firewalld:
    rich_rule: "rule family=ipv4 source address={{ lan_cidr }} port port=53 protocol={{ item }} accept"
    permanent: true
    immediate: true
    state: enabled
  loop: [udp, tcp]
  tags: [dns]

- name: Enable + (re)start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: "{{ 'restarted' if dnsmasq_zone is changed else 'started' }}"
  tags: [dns]

- name: "GATE: dnsmasq resolves a service name to Caddy"
  ansible.builtin.command:
    cmd: "dig +short +time=2 +tries=2 @{{ svc_media_ip }} jellyfin.{{ service_domain }}"
  register: dns_gate
  changed_when: false
  failed_when: svc_media_ip not in dns_gate.stdout
  tags: [dns]

- name: Deploy Caddy reverse proxy (*.{{ service_domain }}, internal CA)
  when: media_access_layer | default('manual') == 'caddy'
  block:
    - name: Install caddy
      ansible.builtin.dnf:
        name: caddy
        state: present

    # Confined caddy (httpd_t) proxies to backends on 127.0.0.1 AND to
    # svc-download over the LAN; without this remote reverse_proxy connects
    # get EACCES (localhost happens to be allowed, remote is not).
    - name: Allow caddy outbound network connects (SELinux)
      ansible.posix.seboolean:
        name: httpd_can_network_connect
        state: true
        persistent: true

    - name: Open Caddy 443 to the LAN source range (v6 rich rule)
      ansible.posix.firewalld:
        rich_rule: "rule family=ipv4 source address={{ lan_cidr }} port port=443 protocol=tcp accept"
        permanent: true
        immediate: true
        state: enabled

    - name: Render Caddyfile from caddy_services
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        mode: "0644"
        validate: "caddy validate --adapter caddyfile --config %s"
      register: caddyfile

    - name: Enable + (re)start caddy
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: "{{ 'restarted' if caddyfile is changed else 'started' }}"
        daemon_reload: true

    # local_certs writes the CA root here on first start. Fetch it so the
    # user can install it on their devices for trusted HTTPS. Public cert
    # (no private key) — safe, but env-specific, so it's gitignored.
    - name: Wait for the internal CA root to exist
      ansible.builtin.wait_for:
        path: /var/lib/caddy/.local/share/caddy/pki/authorities/local/root.crt
        timeout: 30

    - name: Fetch the internal CA root to the control node
      ansible.builtin.fetch:
        src: /var/lib/caddy/.local/share/caddy/pki/authorities/local/root.crt
        dest: "{{ playbook_dir }}/{{ service_domain }}-root-ca.crt"
        flat: true

    - name: "GATE: Caddy answers a hostname vhost with a cert"
      ansible.builtin.command:
        # --resolve so the gate doesn't depend on DNS being wired yet
        cmd: >-
          curl -sk --max-time 10 -o /dev/null -w '%{http_code}'
          --resolve seerr.{{ service_domain }}:443:{{ svc_media_ip }}
          https://seerr.{{ service_domain }}
      register: caddy_gate
      changed_when: false
      failed_when: caddy_gate.stdout not in ['200', '307', '302', '401']
      retries: 3
      delay: 5
      until: caddy_gate is not failed
  tags: [access]

- name: NOTE — Caddy skipped
  ansible.builtin.debug:
    msg: "*** Caddy skipped (media_access_layer={{ media_access_layer | default('manual') }}). ***"
  when: media_access_layer | default('manual') != 'caddy'
  tags: [access]

# ------------------------------------------------------------------ backup ---
- name: Arm the nightly backup timer
  ansible.builtin.systemd:
    name: backup-media.timer
    enabled: true
    state: started
    daemon_reload: true
  tags: [backup]

# ------------------------------------------------------------------ verify ---
- name: "GATE: Jellyfin answers on the LAN IP (v5: no longer on loopback)"
  ansible.builtin.uri:
    url: "http://{{ svc_media_ip }}:8096/System/Info/Public"
    status_code: 200
    timeout: 20
  register: jf
  retries: 6
  delay: 10
  until: jf.status == 200
  tags: [verify]

- name: "GATE: containers actually see their NFS data (exec probes)"
  ansible.builtin.command:
    cmd: >-
      runuser -u homelab -- env XDG_RUNTIME_DIR=/run/user/{{ svc_uid }}
      podman exec {{ item.container }} sh -c '{{ item.probe }}'
    # podman dies if its CWD is unreadable after the uid drop, and ansible's
    # remote cwd is ~straderb (0700) — run from a world-readable dir.
    chdir: /tmp
  loop:
    - { container: jellyfin,       probe: "test -r /media/movies" }
    - { container: audiobookshelf, probe: "touch /audiobooks/.probe-nfs && rm /audiobooks/.probe-nfs" }
    - { container: romm,           probe: "touch /romm/library/.probe-nfs && rm /romm/library/.probe-nfs" }
  loop_control:
    label: "{{ item.container }}"
  register: nfs_probe
  changed_when: false
  retries: 6
  delay: 10
  until: nfs_probe is not failed
  tags: [verify]

- name: svc-media verification summary
  ansible.builtin.set_fact:
    svc_media_verified: true
  tags: [verify]
