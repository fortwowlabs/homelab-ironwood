---
- name: Configure media files
  ansible.builtin.import_tasks: files.yml
  tags: [files]

- name: Migrate legacy media units
  ansible.builtin.import_tasks: migrations.yml
  tags: [migrations]

- name: Prepare media backup storage
  ansible.builtin.import_tasks: nfs.yml
  tags: [nfs]

- name: Converge media applications
  ansible.builtin.import_tasks: apps.yml
  tags: [apps]

- name: Configure media access services
  ansible.builtin.import_tasks: access.yml
  tags: [access]

- name: Configure media backups
  ansible.builtin.import_tasks: backup.yml
  tags: [backup]

- name: Verify media services
  ansible.builtin.import_tasks: verify.yml
  when: not ansible_check_mode
  tags: [verify]
