---
- name: Enable the nightly media backup timer
  ansible.builtin.systemd:
    name: backup-media.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Check for an existing Seerr backup artifact
  ansible.builtin.command: >-
    setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups --
    find /srv/backups/svc-media/appdata -maxdepth 1 -type f
    -name 'seerr-*.tar.gz' -print -quit
  register: media_seerr_backup_before
  changed_when: false
  check_mode: false

- name: Produce an initial verified media backup when none exists
  ansible.builtin.systemd:
    name: backup-media.service
    state: started
  when:
    - not ansible_check_mode
    - media_seerr_backup_before.stdout | length == 0
  changed_when: true
