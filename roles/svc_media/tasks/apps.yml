---
- name: Apply changed rootless service configuration
  ansible.builtin.meta: flush_handlers

- name: Read rootless media service state
  ansible.builtin.command: "systemctl --user -M homelab@ is-active {{ item.name }}.service"
  loop: "{{ media_quadlet_catalog }}"
  loop_control:
    label: "{{ item.name }}"
  register: media_service_states
  failed_when: false
  changed_when: false
  check_mode: false

- name: Start inactive rootless media services
  ansible.builtin.command: "systemctl --user -M homelab@ start {{ item.item.name }}.service"
  loop: "{{ media_service_states.results | selectattr('rc', 'ne', 0) | list }}"
  loop_control:
    label: "{{ item.item.name }}"
  changed_when: true
