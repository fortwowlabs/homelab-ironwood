---
# A single manifest drives initial-backup gating and safe artifact validation.
media_backup_artifacts:
  - name: jellyfin
    directory: /srv/backups/svc-media/appdata
    pattern: jellyfin-config-*.tar.gz
    format: tar
  - name: seerr
    directory: /srv/backups/svc-media/appdata
    pattern: seerr-*.tar.gz
    format: tar
  - name: romm-appdata
    directory: /srv/backups/svc-media/appdata
    pattern: romm-appdata-*.tar.gz
    format: tar
  - name: romm-database
    directory: /srv/backups/svc-media/romm-db
    pattern: romm-*.sql.gz
    format: gzip
