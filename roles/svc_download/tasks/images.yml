---
# Pull immutable images before any queued VPN restart can propagate to
# the PartOf/BindsTo application units. The maintenance helper opens egress
# only when the strict host backstop is already active and closes it fatally.
#
# The set is the catalog images PLUS the Beszel agent image when the agent is
# configured — the agent is not a download_app but still needs its image
# pre-pulled here, because the strict backstop blocks the on-demand registry
# pull (DNS egress denied) that podman would otherwise attempt at start.
- name: Assemble the immutable images this host requires
  ansible.builtin.set_fact:
    download_required_images: >-
      {{ (download_apps | dict2items | map(attribute='value.image') | list)
         + ([beszel_agent_image] if beszel_agent_enabled | bool else []) }}
  changed_when: false

- name: Check catalog image availability
  ansible.builtin.command: "podman image exists {{ item }}"
  loop: "{{ download_required_images }}"
  register: download_image_checks
  failed_when: false
  changed_when: false
  check_mode: false

- name: Pull missing immutable images through guarded egress
  when:
    - not ansible_check_mode
    - download_image_checks.results | selectattr('rc', 'ne', 0) | list | length > 0
  block:
    - name: Open maintenance egress for image pulls
      ansible.builtin.command: /usr/local/sbin/homelab-maintenance-egress open
      register: download_image_egress_open
      changed_when: "'opened' in download_image_egress_open.stdout"

    - name: Pull missing immutable images
      ansible.builtin.command: "podman pull {{ item.item }}"
      loop: "{{ download_image_checks.results | selectattr('rc', 'ne', 0) | list }}"
      loop_control:
        label: "{{ item.item }}"
      changed_when: true
  always:
    - name: Restore strict backstop after image pulls
      ansible.builtin.command: /usr/local/sbin/homelab-maintenance-egress close
      register: download_image_egress_close
      changed_when: "'closed' in download_image_egress_close.stdout"

- name: Report missing immutable images during check mode
  when:
    - ansible_check_mode
    - download_image_checks.results | selectattr('rc', 'ne', 0) | list | length > 0
  ansible.builtin.debug:
    msg: >-
      Missing immutable images would be pulled through the guarded maintenance
      window before any queued service restart.
  changed_when: true
