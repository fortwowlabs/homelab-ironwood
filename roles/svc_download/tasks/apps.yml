---
- name: Queue restarts for changed generated download units
  ansible.builtin.debug:
    msg: "Applying changed catalog units."
  changed_when: >-
    (download_apps_to_restart + download_proxy_sockets_to_restart
     + download_proxy_services_to_restart) | length > 0
  notify: restart changed download units

- name: Apply changed catalog unit handlers after immutable images exist
  ansible.builtin.meta: flush_handlers

- name: Ensure catalog applications are started
  ansible.builtin.systemd:
    name: "dl-{{ item.item.key }}.service"
    state: started
  loop: "{{ download_quadlet_templates.results }}"
  loop_control:
    label: "{{ item.item.key }}"

- name: Ensure the Beszel agent is started
  ansible.builtin.systemd:
    name: beszel-agent.service
    state: "{{ 'restarted' if (download_beszel_agent_template.changed | default(false)) else 'started' }}"
  when: beszel_agent_enabled | bool

- name: Ensure Recyclarr is started
  ansible.builtin.systemd:
    name: recyclarr.service
    state: "{{ 'restarted' if (download_recyclarr_template.changed | default(false)) else 'started' }}"
  when: download_recyclarr_enabled | default(false) | bool

- name: Allow socket proxy bind and connect operations under SELinux
  ansible.posix.seboolean:
    name: "{{ item }}"
    state: true
    persistent: true
  loop: [systemd_socket_proxyd_bind_any, systemd_socket_proxyd_connect_any]

- name: Install proxyd no-new-privileges SELinux policy source
  ansible.builtin.copy:
    src: proxyd-nnp.te
    dest: /etc/nftables/proxyd-nnp.te
    mode: "0644"
  register: download_proxyd_policy_source

- name: Check proxyd SELinux policy state
  ansible.builtin.command: semodule -l
  register: download_selinux_modules
  changed_when: false

- name: Compile and install proxyd SELinux policy
  ansible.builtin.shell: |
    set -euo pipefail
    workdir=$(mktemp -d)
    trap 'rm -rf "$workdir"' EXIT
    checkmodule -M -m -o "$workdir/proxyd-nnp.mod" /etc/nftables/proxyd-nnp.te
    semodule_package -o "$workdir/proxyd-nnp.pp" -m "$workdir/proxyd-nnp.mod"
    semodule -i "$workdir/proxyd-nnp.pp"
  when: download_proxyd_policy_source is changed or 'proxyd-nnp' not in download_selinux_modules.stdout
  changed_when: true
  notify: restart ui proxies

- name: Enable catalog proxy sockets
  ansible.builtin.systemd:
    name: "{{ item.item.key }}-proxy.socket"
    enabled: true
    state: started
  loop: "{{ download_proxy_socket_templates.results }}"
  loop_control:
    label: "{{ item.item.key }}-proxy.socket"

- name: Arm continuous leak verification
  ansible.builtin.systemd:
    name: leak-canary.timer
    enabled: true
    state: started
