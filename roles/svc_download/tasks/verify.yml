---
- name: Verify VPN namespace egress identity
  ansible.builtin.command: ip netns exec vpn curl -4 --max-time 15 https://am.i.mullvad.net/connected
  register: download_mullvad_jail
  changed_when: false
  failed_when: "'You are connected to Mullvad' not in download_mullvad_jail.stdout"

- name: Verify the strict host output policy is loaded
  ansible.builtin.command: nft list chain inet host_backstop output
  register: download_host_output_policy
  changed_when: false
  failed_when: >-
    'policy drop' not in
    (download_host_output_policy.stdout | regex_replace('\\s+', ' '))

- name: Verify firewalld remains inactive beside the nftables owner
  ansible.builtin.command: systemctl is-active firewalld.service
  register: download_verify_firewalld_state
  changed_when: false
  failed_when: download_verify_firewalld_state.rc not in [3, 4]

- name: Verify numeric HTTPS egress from the host remains fenced
  ansible.builtin.command:
    argv:
      - curl
      - -4
      - --insecure
      - --silent
      - --show-error
      - --output
      - /dev/null
      - --max-time
      - "5"
      - https://1.1.1.1/
  register: download_host_egress
  changed_when: false
  failed_when: download_host_egress.rc == 0

- name: Verify every catalog container is in the VPN namespace
  ansible.builtin.shell: |
    set -euo pipefail
    pid=$(podman inspect -f '{% raw %}{{.State.Pid}}{% endraw %}' {{ item.key | quote }})
    test "$pid" -gt 0
    test "$(stat -Lc %i /proc/$pid/ns/net)" = "$(stat -Lc %i /run/netns/vpn)"
  args:
    executable: /bin/bash
  loop: "{{ download_apps | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  changed_when: false

- name: Verify every catalog UI proxy answers
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ item.value.ui_port }}"
    status_code: [200, 301, 302, 303, 401, 403]
  loop: "{{ download_apps | dict2items | selectattr('value.proxy') | list }}"
  loop_control:
    label: "{{ item.key }}"
  register: download_proxy_gate
  retries: 3
  delay: 5
  until: download_proxy_gate is not failed

- name: Verify Mullvad from inside a workload
  ansible.builtin.command: podman exec sabnzbd curl -4 -s --max-time 15 https://am.i.mullvad.net/connected
  register: download_mullvad_container
  changed_when: false
  failed_when: "'You are connected to Mullvad' not in download_mullvad_container.stdout"

- name: Run continuous leak canary immediately
  ansible.builtin.command:
    argv:
      - /bin/bash
      - -c
      - >-
        set -a; source /etc/homelab-notify.env;
        exec /usr/local/sbin/leak-canary.sh
  register: download_canary
  changed_when: false
  no_log: true
  diff: false

- name: Find fresh nonempty catalog backup artifacts
  ansible.builtin.command:
    argv:
      - find
      - "/srv/backups/{{ inventory_hostname }}"
      - -maxdepth
      - "1"
      - -type
      - f
      - -size
      - +0c
      - -mtime
      - "-2"
      - -name
      - "{{ item }}-*.tar.gz"
      - -print
      - -quit
  loop: >-
    {{ download_apps | dict2items | map(attribute='value.backup_paths')
       | list | flatten | unique | list }}
  loop_control:
    label: "{{ item }}"
  register: download_backup_artifact_gates
  changed_when: false

- name: Assert every catalog backup artifact is fresh and nonempty
  ansible.builtin.assert:
    that:
      - >-
        download_backup_artifact_gates.results
        | selectattr('stdout', 'equalto', '') | list | length == 0
    fail_msg: >-
      A fresh nonempty download appdata backup is missing. Inspect
      backup-dl-appdata.service and the NFS backup mount.

- name: Validate every catalog backup archive
  ansible.builtin.command:
    argv: [tar, -tzf, "{{ item.stdout }}"]
  loop: "{{ download_backup_artifact_gates.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: false

- name: Mark download verification complete
  ansible.builtin.set_fact:
    svc_download_verified: true
