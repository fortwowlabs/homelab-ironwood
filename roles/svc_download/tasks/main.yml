---
# ============================================================================
# svc_download — the netns VPN jail + SAB/arr stack.
# Mirrors DEPLOY.md Phase 4. Tags let you run slices (v5: tag routing through
# site.yml works now):
#   --tags files      (place scripts/units/quadlets/nft)
#   --tags secrets    (render peer.conf + vpn-netns.env from vault)
#   --tags nfs        (mount /srv/media + /srv/backups)
#   --tags jail       (backstop + bring the netns up)
#   --tags containers (start dl-* + proxies)
#   --tags backup     (nightly appdata backup timer)
#   --tags verify     (the Phase 4 GATE assertions)
# v5 stack: SABnzbd + Prowlarr + Sonarr + Radarr. NZBHydra2 removed —
# Prowlarr is the indexer layer for an arr-only stack.
# ============================================================================

# ---------------------------------------------------------------- packages ---
# On a re-run the backstop is already loaded and blocks DNS, so a dnf
# metadata refresh fails ("Could not resolve mirrors.rockylinux.org"). Check
# presence with rpm first and only reach the network — through the patch
# window — when something is genuinely missing. Steady state: no egress.
- name: Which required packages are missing?
  ansible.builtin.shell:
    cmd: "rpm -q {{ _dl_packages | join(' ') }} >/dev/null 2>&1 || rpm -q {{ _dl_packages | join(' ') }} 2>&1 | awk '/is not installed/{print $2}'"
  vars:
    _dl_packages: [epel-release, wireguard-tools, podman, curl, nfs-utils, policycoreutils-python-utils, checkpolicy]
  register: dl_pkgs_missing
  changed_when: false
  tags: [files]

- name: Install missing packages through the patch window
  when: dl_pkgs_missing.stdout | trim | length > 0
  block:
    - name: Open patch window (pkgs)
      ansible.builtin.command:
        cmd: nft -f /etc/nftables/patch-window.nft
      changed_when: true

    - name: dnf install the missing packages
      ansible.builtin.dnf:
        name: "{{ dl_pkgs_missing.stdout_lines }}"
        state: present
  always:
    - name: Close patch window (reload strict backstop)
      ansible.builtin.command:
        cmd: nft -f /etc/nftables/host-backstop.nft
      changed_when: true
      # Backstop file may not exist yet on a truly-first run; the later jail
      # bring-up renders + loads it. Harmless if the open window persists
      # until then (egress is intended during first-run package install).
      failed_when: false
  tags: [files]

- name: systemd-socket-proxyd must be present (ships in systemd rpm)
  ansible.builtin.stat:
    path: /usr/lib/systemd/systemd-socket-proxyd
  register: proxyd
  failed_when: not proxyd.stat.exists
  tags: [files]

- name: Allow containers to use NFS-backed volumes
  ansible.posix.seboolean:
    name: virt_use_nfs
    state: true
    persistent: true
  tags: [files]

# ------------------------------------------------------------------- files ---
- name: Install jail scripts to /usr/local/sbin
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/usr/local/sbin/{{ item }}"
    mode: "0750"
  loop:
    - vpn-netns-up.sh
    - vpn-netns-down.sh
    - refresh-mullvad-endpoints.sh
  tags: [files]

- name: Render the leak canary (ntfy target baked in)
  ansible.builtin.template:
    src: leak-canary.sh.j2
    dest: /usr/local/sbin/leak-canary.sh
    mode: "0750"
  tags: [files]

- name: Render the appdata backup script (ntfy target baked in)
  ansible.builtin.template:
    src: backup-dl-appdata.sh.j2
    dest: /usr/local/sbin/backup-dl-appdata.sh
    mode: "0750"
  tags: [files, backup]

- name: Canary state dir (holds the persistent tripped flag)
  ansible.builtin.file:
    path: /var/lib/leak-canary
    state: directory
    mode: "0750"
  tags: [files]

- name: Install systemd units + socket proxies
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | basename }}"
    mode: "0644"
  loop:
    - vpn-netns.service
    - leak-canary.service
    - leak-canary.timer
    - backup-dl-appdata.service
    - backup-dl-appdata.timer
    - proxies/sab-proxy.socket
    - proxies/sab-proxy.service
    - proxies/prowlarr-proxy.socket
    - proxies/prowlarr-proxy.service
    - proxies/sonarr-proxy.socket
    - proxies/sonarr-proxy.service
    - proxies/radarr-proxy.socket
    - proxies/radarr-proxy.service
    - proxies/ll-proxy.socket
    - proxies/ll-proxy.service
  notify: reload systemd
  tags: [files, backup]

- name: Install rootful quadlets
  ansible.builtin.copy:
    src: "quadlets/{{ item }}"
    dest: "/etc/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - dl-sabnzbd.container
    - dl-prowlarr.container
    - dl-sonarr.container
    - dl-radarr.container
    - dl-lazylibrarian.container
  notify: reload systemd
  tags: [files]

- name: Render nftables backstop from template (NOT enabled yet)
  ansible.builtin.template:
    src: host-backstop.nft.j2
    dest: /etc/nftables/host-backstop.nft
    mode: "0644"
  # Without this a changed template sits on disk unloaded: the endpoint
  # refresh only does `nft -f` when the table is ABSENT.
  notify: reload host-backstop
  tags: [files, jail]

- name: Install patch-window helper
  ansible.builtin.copy:
    src: patch-window.nft
    dest: /etc/nftables/patch-window.nft
    mode: "0644"
  tags: [files, jail]

- name: Seed mullvad-endpoints.nft only if absent
  ansible.builtin.copy:
    src: mullvad-endpoints.nft.seed
    dest: /etc/nftables/mullvad-endpoints.nft
    mode: "0644"
    force: false
  tags: [files, jail]

- name: netns resolver dir
  ansible.builtin.file:
    path: /etc/netns/vpn
    state: directory
    mode: "0755"
  tags: [files]

- name: netns resolver (Mullvad in-tunnel DNS)
  ansible.builtin.copy:
    dest: /etc/netns/vpn/resolv.conf
    content: "nameserver {{ mullvad_dns }}\n"
    mode: "0644"
  tags: [files]

- name: Create appdata dirs (10001) + local incomplete
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  loop:
    - /srv/appdata/sabnzbd
    - /srv/appdata/prowlarr
    - /srv/appdata/sonarr
    - /srv/appdata/radarr
    - /srv/appdata/lazylibrarian
    - /var/lib/sabnzbd-incomplete
  tags: [files]

# Mountpoints only — no owner/group: once the NFS mount is live (fstab from a
# previous run), chown/chgrp here hits the server through root-squash and
# fails; server-side ownership is authoritative (the write-probe below is the
# real check).
- name: Create NFS mountpoints
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - /srv/media
    - /srv/backups
  tags: [files]

# ----------------------------------------------------------------- secrets ---
- name: Render peer.conf from vault (600)
  ansible.builtin.template:
    src: peer.conf.j2
    dest: /etc/wireguard/peer.conf
    owner: root
    group: root
    mode: "0600"
  notify: restart vpn-netns
  tags: [secrets]

- name: Render vpn-netns.env from vault (600)
  ansible.builtin.template:
    src: vpn-netns.env.j2
    dest: /etc/vpn-netns.env
    owner: root
    group: root
    mode: "0600"
  notify: restart vpn-netns
  tags: [secrets]

# --------------------------------------------------------------------- nfs ---
- name: Mount /srv/media + /srv/backups over NFSv4 (persist in fstab)
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ truenas_ip }}:{{ item.export }}"
    fstype: nfs4
    opts: "{{ nfs_opts }}"
    state: mounted
  loop:
    - { path: /srv/media,   export: "{{ nfs_media_export }}" }
    - { path: /srv/backups, export: "{{ nfs_backups_export }}" }
  tags: [nfs]

- name: Prove NFS is writable as the service uid
  ansible.builtin.command:
# setpriv, not runuser: runuser -u wants a username and rejects '#uid'.
    cmd: "setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups -- touch /srv/media/.probe-dl"
  changed_when: false
  tags: [nfs, verify]

# As the service uid, like the probe — root gets squashed and can't unlink.
- name: Clean up probe
  ansible.builtin.command:
    cmd: "setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups -- rm -f /srv/media/.probe-dl"
  changed_when: false
  tags: [nfs, verify]

# Book/audiobook library dirs on NFS, created as the service uid (root-squash
# rejects root mkdir). LazyLibrarian writes here; Audiobookshelf reads them.
- name: Create book library dirs on NFS
  ansible.builtin.command:
    cmd: "setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups -- mkdir -p /srv/media/{{ item }}"
  args:
    creates: "/srv/media/{{ item }}"
  loop: [books, ebooks, audiobooks]
  tags: [nfs, files]

# -------------------------------------------------------------------- jail ---
# The backstop's input chain is default-drop. We assert LAN_ADMIN matches the
# intended admin scope BEFORE enabling, so Ansible's own SSH survives.
# firewalld off first.
- name: Confirm LAN_ADMIN in host-backstop covers our control path
  ansible.builtin.command:
    cmd: "grep -q 'define LAN_ADMIN = {{ lan_cidr }}' /etc/nftables/host-backstop.nft"
  changed_when: false
  tags: [jail]

- name: Disable firewalld (host-backstop owns both directions)
  ansible.builtin.systemd:
    name: firewalld
    enabled: false
    state: stopped
  failed_when: false
  tags: [jail]

- name: Populate Mullvad endpoint sets (IPs + ports) + load backstop table
  ansible.builtin.command:
    cmd: /usr/local/sbin/refresh-mullvad-endpoints.sh
  changed_when: true
  tags: [jail]

- name: Persist nftables include across reboot
  ansible.builtin.lineinfile:
    path: /etc/sysconfig/nftables.conf
    line: 'include "/etc/nftables/host-backstop.nft"'
    create: true
    mode: "0644"
  tags: [jail]

- name: Enable nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
  tags: [jail]

- name: Verify SSH admission survived the backstop (sanity, before we trust it)
  ansible.builtin.command:
    cmd: nft list chain inet host_backstop input
  register: nft_input
  changed_when: false
  failed_when: "'dport 22 accept' not in (nft_input.stdout | regex_replace('\\s+', ' '))"
  tags: [jail]

- name: Bring up the netns jail
  ansible.builtin.systemd:
    name: vpn-netns.service
    enabled: true
    state: started
  tags: [jail]

- name: "GATE: jail egresses via Mullvad"
  ansible.builtin.command:
    cmd: ip netns exec vpn curl -4 --max-time 15 https://am.i.mullvad.net/connected
  register: mullvad_jail
  changed_when: false
  failed_when: "'You are connected to Mullvad' not in mullvad_jail.stdout"
  tags: [jail, verify]

- name: "GATE: host itself is fenced (must time out)"
  ansible.builtin.command:
    cmd: curl -4 --max-time 5 https://ifconfig.me
  register: host_egress
  changed_when: false
  failed_when: host_egress.rc == 0    # success = leak; we WANT failure/timeout
  tags: [jail, verify]

# -------------------------------------------------------------- containers ---
- name: Reload so generated quadlet units exist
  ansible.builtin.systemd:
    daemon_reload: true
  tags: [containers]

# First deploy: podman pulls images in the HOST netns, which the backstop
# fences — only the running containers live in the vpn netns. Open the patch
# window just for missing images; the strict backstop always reloads after.
- name: Check which container images are present
  ansible.builtin.command:
    cmd: "podman image exists {{ item }}"
  loop:
    - lscr.io/linuxserver/sabnzbd:latest
    - lscr.io/linuxserver/prowlarr:latest
    - lscr.io/linuxserver/sonarr:latest
    - lscr.io/linuxserver/radarr:latest
    - lscr.io/linuxserver/lazylibrarian:latest
  register: dl_images
  failed_when: false
  changed_when: false
  tags: [containers]

- name: Pre-pull missing images through the patch window
  when: dl_images.results | selectattr('rc', 'ne', 0) | list | length > 0
  block:
    - name: Open patch window
      ansible.builtin.command:
        cmd: nft -f /etc/nftables/patch-window.nft
      changed_when: true

    - name: Pull missing images
      ansible.builtin.command:
        cmd: "podman pull {{ item.item }}"
      loop: "{{ dl_images.results | selectattr('rc', 'ne', 0) | list }}"
      loop_control:
        label: "{{ item.item }}"
      changed_when: true
  always:
    - name: Close patch window (reload strict backstop)
      ansible.builtin.command:
        cmd: nft -f /etc/nftables/host-backstop.nft
      changed_when: true
  tags: [containers]

- name: Start download containers
  ansible.builtin.systemd:
    name: "dl-{{ item }}.service"
    state: started
  loop: [sabnzbd, prowlarr, sonarr, radarr, lazylibrarian]
  tags: [containers]

# The proxy sockets/services run as systemd_socket_proxyd_t, which SELinux
# confines to specific ports. Without these booleans the socket binds fail
# with EACCES and NO audit record (systemd's internal labeling path).
- name: Allow systemd-socket-proxyd any bind/connect (SELinux booleans)
  ansible.posix.seboolean:
    name: "{{ item }}"
    state: true
    persistent: true
  loop: [systemd_socket_proxyd_bind_any, systemd_socket_proxyd_connect_any]
  tags: [containers]

# The proxy units set NoNewPrivileges=yes. Under NNP, SELinux needs an
# explicit nnp_transition allow for init_t -> systemd_socket_proxyd_t or the
# transition is silently skipped: proxyd runs as init_t, its connect() to the
# jail veth EACCESes, and the booleans above are inert (wrong domain). The
# denial only shows as security_bounded_transition in the raw audit log.
# (checkpolicy is installed up top with the other packages, before the
# backstop blocks the DNS a dnf refresh would need.)
- name: proxyd-nnp SELinux module source
  ansible.builtin.copy:
    src: proxyd-nnp.te
    dest: /etc/nftables/proxyd-nnp.te
    mode: "0644"
  register: proxyd_nnp_te
  tags: [containers]

- name: Is the proxyd-nnp module loaded?
  ansible.builtin.shell: "semodule -l | grep -qw proxyd-nnp"
  register: proxyd_nnp_mod
  failed_when: false
  changed_when: false
  tags: [containers]

- name: Compile + load proxyd-nnp module
  ansible.builtin.shell: |
    set -euo pipefail
    d=$(mktemp -d)
    trap 'rm -rf "$d"' EXIT
    checkmodule -M -m -o "$d/proxyd-nnp.mod" /etc/nftables/proxyd-nnp.te
    semodule_package -o "$d/proxyd-nnp.pp" -m "$d/proxyd-nnp.mod"
    semodule -i "$d/proxyd-nnp.pp"
  when: proxyd_nnp_te is changed or proxyd_nnp_mod.rc != 0
  changed_when: true
  notify: restart ui proxies
  tags: [containers]

- name: Enable + start UI socket proxies
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - sab-proxy.socket
    - prowlarr-proxy.socket
    - sonarr-proxy.socket
    - radarr-proxy.socket
    - ll-proxy.socket
  tags: [containers]

- name: Arm the leak canary timer
  ansible.builtin.systemd:
    name: leak-canary.timer
    enabled: true
    state: started
  tags: [containers]

# ------------------------------------------------------------------ backup ---
- name: Arm the nightly appdata backup timer
  ansible.builtin.systemd:
    name: backup-dl-appdata.timer
    enabled: true
    state: started
  tags: [backup]

# ------------------------------------------------------------------ verify ---
# The gate that matters: every container is INSIDE the jail netns.
- name: "GATE: each dl-* container is in /run/netns/vpn"
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      want=$(stat -Lc %i /run/netns/vpn)
      # Compare the main PID's netns inode. SandboxKey is EMPTY for
      # containers joined to a pre-made netns via --network=ns: (podman only
      # fills it for netns it created), so it cannot prove membership here.
      for c in sabnzbd prowlarr sonarr radarr lazylibrarian; do
        pid=$(podman inspect -f '{{ '{{' }}.State.Pid{{ '}}' }}' "$c")
        [ "$pid" -gt 0 ] || { echo "LEAK: $c not running (pid=$pid)"; exit 1; }
        [ "$(stat -Lc %i /proc/$pid/ns/net)" = "$want" ] || { echo "LEAK: $c not in jail (pid=$pid)"; exit 1; }
      done
      echo "all-in-jail"
    executable: /bin/bash
  register: jail_membership
  changed_when: false
  failed_when: "'all-in-jail' not in jail_membership.stdout"
  tags: [verify]

# End-to-end through socket-activation, proxyd, the veth, and the container
# — a green jail with dead proxies passed every earlier gate (the backstop
# output chain silently EPERM'd the proxy backends once).
- name: "GATE: UI proxies answer on the LAN IP"
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ item }}"
    status_code: [200, 301, 302, 303, 401, 403]
  loop: [8080, 9696, 8989, 7878]
  register: proxy_gate
  retries: 3
  delay: 5
  until: proxy_gate is not failed
  tags: [verify]

- name: "GATE: Mullvad confirmed from inside a container"
  ansible.builtin.command:
    cmd: podman exec sabnzbd curl -4 -s --max-time 15 https://am.i.mullvad.net/connected
  register: mullvad_container
  changed_when: false
  failed_when: "'You are connected to Mullvad' not in mullvad_container.stdout"
  tags: [verify]

- name: "GATE: fail-closed — stopping the jail stops the containers"
  ansible.builtin.shell:
    cmd: |
      set -uo pipefail
      systemctl stop vpn-netns
      st=$(systemctl is-active dl-sabnzbd || true)
      systemctl start vpn-netns dl-sabnzbd dl-prowlarr dl-sonarr dl-radarr
      [ "$st" = "inactive" ] || { echo "FAIL: dl-sabnzbd stayed $st when jail stopped"; exit 1; }
      echo "fail-closed-ok"
    executable: /bin/bash
  register: killtest
  changed_when: true
  failed_when: "'fail-closed-ok' not in killtest.stdout"
  tags: [verify, killtest]

- name: "GATE: leak-canary passes (also fails if a prior trip is uncleared)"
  ansible.builtin.command:
    cmd: /usr/local/sbin/leak-canary.sh
  register: canary
  changed_when: false
  failed_when: canary.rc != 0
  tags: [verify]

- name: svc-download verification summary
  ansible.builtin.set_fact:
    svc_download_verified: true
  tags: [verify]
