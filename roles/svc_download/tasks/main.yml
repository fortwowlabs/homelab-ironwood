---
- name: Validate download host prerequisites
  ansible.builtin.import_tasks: packages.yml
  tags: [files]

- name: Install download host configuration
  ansible.builtin.import_tasks: files.yml
  tags: [files, secrets]

- name: Apply guarded legacy migrations
  ansible.builtin.import_tasks: migrations.yml
  tags: [files]

- name: Prepare download library paths
  ansible.builtin.import_tasks: nfs.yml
  tags: [nfs]

- name: Acquire immutable download images
  ansible.builtin.import_tasks: images.yml
  # Image availability is a prerequisite for every handler flush: a files- or
  # jail-tagged run must not restart a unit onto an unavailable digest.
  tags: [always]

- name: Converge VPN jail
  ansible.builtin.import_tasks: jail.yml
  tags: [jail]

- name: Converge download applications
  ansible.builtin.import_tasks: apps.yml
  tags: [containers]

- name: Configure download backups
  ansible.builtin.import_tasks: backup.yml
  tags: [backup]

- name: Verify download invariants
  ansible.builtin.import_tasks: verify.yml
  when: not ansible_check_mode
  tags: [verify]
