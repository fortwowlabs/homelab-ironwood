---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: reload host-backstop
  ansible.builtin.command:
    cmd: nft -f /etc/nftables/host-backstop.nft
  # The file ends with an include of mullvad-endpoints.nft, so the endpoint
  # sets repopulate atomically with the reload.

- name: restart vpn-netns
  ansible.builtin.systemd:
    name: vpn-netns.service
    state: restarted
  # Only fires if the unit is already loaded; safe during initial run because
  # the jail bring-up task starts it after secrets are in place.
  failed_when: false
