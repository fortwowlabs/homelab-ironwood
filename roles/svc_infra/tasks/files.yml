---
- name: Enable lingering for the rootless service account
  ansible.builtin.command: loginctl enable-linger homelab
  changed_when: false

- name: Ensure the rootless Quadlet directory exists
  ansible.builtin.file:
    path: /opt/homelab/.config/containers/systemd
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"

# Single-container catalog apps declare their own appdata paths as Quadlet
# Volume= sources (e.g. "/opt/homelab/appdata/uptime-kuma/data:/app/data:Z");
# derive the directories to create from the catalog instead of hand-listing
# them here, so a new catalog entry doesn't also require a new task. Bespoke
# multi-container services (a database/cache sidecar) declare their own
# appdata directories in their own tasks, appended below this file over time
# — see roles/svc_media/tasks/files.yml for that pattern.
- name: Determine appdata directories required by the infra catalog
  vars:
    infra_volume_sources: >-
      {{ infra_apps.values() | map(attribute='volumes') | list | flatten
         | map('regex_replace', '^([^:]+):.*$', '\1') | list }}
  ansible.builtin.set_fact:
    infra_appdata_dirs: >-
      {{ infra_volume_sources | select('match', '^/opt/homelab/appdata/') | unique | list }}
  changed_when: false

- name: Create catalog application data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  loop: "{{ infra_appdata_dirs }}"

- name: Render single-container infra Quadlets from the catalog
  ansible.builtin.template:
    src: infra-app.container.j2
    dest: "/opt/homelab/.config/containers/systemd/{{ item.key }}.container"
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  loop: "{{ infra_apps | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: infra_quadlet_templates

- name: Create Paperless-ngx appdata directories
  ansible.builtin.file:
    path: "/opt/homelab/appdata/paperless/{{ item }}"
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  loop: [data, media, export, consume]

- name: Create the Paperless-ngx redis appdata directory
  ansible.builtin.file:
    path: /opt/homelab/appdata/paperless-redis
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"

- name: Install the Paperless-ngx private network Quadlet
  ansible.builtin.copy:
    src: quadlets/paperless.network
    dest: /opt/homelab/.config/containers/systemd/paperless.network
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_paperless_network

- name: Render the Paperless-ngx redis Quadlet
  ansible.builtin.template:
    src: paperless-redis.container.j2
    dest: /opt/homelab/.config/containers/systemd/paperless-redis.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_paperless_redis_template

- name: Require the Paperless-ngx secret key
  ansible.builtin.assert:
    that:
      - (vault_paperless_secret_key | default('')) | length > 0
    fail_msg: >-
      Configure vault_paperless_secret_key (openssl rand -hex 32) in the
      encrypted inventory.
  no_log: true
  diff: false

- name: Render the Paperless-ngx Quadlet
  ansible.builtin.template:
    src: paperless.container.j2
    dest: /opt/homelab/.config/containers/systemd/paperless.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_paperless_template
  no_log: true
  diff: false

- name: Create NetBox appdata directories
  ansible.builtin.file:
    path: "/opt/homelab/appdata/netbox/{{ item }}"
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  loop: [media, reports, scripts]

- name: Create the NetBox database and redis appdata directories
  ansible.builtin.file:
    path: "/opt/homelab/appdata/{{ item }}"
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  loop: [netbox-db, netbox-redis]

- name: Install the NetBox private network Quadlet
  ansible.builtin.copy:
    src: quadlets/netbox.network
    dest: /opt/homelab/.config/containers/systemd/netbox.network
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_netbox_network

- name: Require NetBox secrets
  ansible.builtin.assert:
    that:
      - (vault_netbox_db_password | default('')) | length > 0
      - (vault_netbox_secret_key | default('')) | length >= 50
      - (vault_netbox_redis_password | default('')) | length > 0
      - (vault_netbox_superuser_password | default('')) | length > 0
    fail_msg: >-
      Configure vault_netbox_db_password, vault_netbox_secret_key (NetBox
      requires 50+ characters), vault_netbox_redis_password, and
      vault_netbox_superuser_password in the encrypted inventory.
  no_log: true
  diff: false

- name: Render the NetBox database Quadlet
  ansible.builtin.template:
    src: netbox-db.container.j2
    dest: /opt/homelab/.config/containers/systemd/netbox-db.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_netbox_db_template
  no_log: true
  diff: false

- name: Render the NetBox redis Quadlet
  ansible.builtin.template:
    src: netbox-redis.container.j2
    dest: /opt/homelab/.config/containers/systemd/netbox-redis.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_netbox_redis_template
  no_log: true
  diff: false

- name: Render the NetBox Quadlet
  ansible.builtin.template:
    src: netbox.container.j2
    dest: /opt/homelab/.config/containers/systemd/netbox.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_netbox_template
  no_log: true
  diff: false

- name: Create the Immich database and redis appdata directories
  ansible.builtin.file:
    path: "/opt/homelab/appdata/{{ item }}"
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  loop: [immich-db, immich-redis]

- name: Check the Immich photo library directory on the NFS export
  ansible.builtin.command: test -d /srv/media/photos
  register: infra_immich_photos_dir
  failed_when: false
  changed_when: false
  check_mode: false

# NFS root-squash: create the library dir as the service UID, not root (same
# idiom as svc_media/tasks/nfs.yml). Immich (container-root == host homelab)
# then owns it and can write uploads/thumbs there.
- name: Create the Immich photo library directory as the service UID
  ansible.builtin.command: >-
    setpriv --reuid={{ svc_uid }} --regid={{ svc_gid }} --clear-groups --
    mkdir -p /srv/media/photos
  when: infra_immich_photos_dir.rc != 0
  changed_when: true

- name: Install the Immich private network Quadlet
  ansible.builtin.copy:
    src: quadlets/immich.network
    dest: /opt/homelab/.config/containers/systemd/immich.network
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_immich_network

- name: Require the Immich database password
  ansible.builtin.assert:
    that:
      - (vault_immich_db_password | default('')) | length > 0
    fail_msg: >-
      Configure vault_immich_db_password (openssl rand -hex 24) in the
      encrypted inventory.
  no_log: true
  diff: false

- name: Render the Immich database Quadlet
  ansible.builtin.template:
    src: immich-db.container.j2
    dest: /opt/homelab/.config/containers/systemd/immich-db.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_immich_db_template
  no_log: true
  diff: false

- name: Render the Immich redis Quadlet
  ansible.builtin.template:
    src: immich-redis.container.j2
    dest: /opt/homelab/.config/containers/systemd/immich-redis.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_immich_redis_template

- name: Render the Immich server Quadlet
  ansible.builtin.template:
    src: immich-server.container.j2
    dest: /opt/homelab/.config/containers/systemd/immich-server.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_immich_server_template
  no_log: true
  diff: false

- name: Ensure the Beszel agent appdata directory exists
  ansible.builtin.file:
    path: /opt/homelab/appdata/beszel-agent
    state: directory
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0755"
  when: beszel_agent_enabled | bool

- name: Render the Beszel agent Quadlet
  ansible.builtin.template:
    src: beszel-agent.container.j2
    dest: /opt/homelab/.config/containers/systemd/beszel-agent.container
    owner: "{{ svc_uid }}"
    group: "{{ svc_gid }}"
    mode: "0644"
  register: infra_beszel_agent_template
  when: beszel_agent_enabled | bool
  no_log: true
  diff: false

- name: WARN that the Beszel agent is not yet configured
  ansible.builtin.debug:
    msg: >-
      *** WARNING: the Beszel token and key are empty — the
      Beszel agent on {{ inventory_hostname }} is NOT deployed. Visit
      https://beszel.{{ service_domain }}, create a universal token under
      Settings > Tokens, fill both vault vars, and re-run the deploy. See
      docs/services.md "Beszel monitoring setup". ***
  when: not (beszel_agent_enabled | bool)

- name: Start firewalld before opening catalog service ports
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  when: infra_apps | length > 0

# Every catalog app publishes on svc-infra's LAN IP (see
# infra-app.container.j2) so Caddy on {{ media_host }} can reach it — open
# ui_port (always tcp) to the LAN here, matching svc_media's equivalent task.
- name: Open LAN-scoped infra catalog service ports
  ansible.posix.firewalld:
    rich_rule: >-
      rule family=ipv4 source address={{ lan_cidr }} port
      port={{ item.value.ui_port }} protocol=tcp accept
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ infra_apps | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

# extra_ports (e.g. Syncthing's sync/discovery ports) aren't reached through
# Caddy, just opened directly — a separate task since each entry already
# carries its own protocol, unlike ui_port above.
- name: Open LAN-scoped infra catalog extra ports
  ansible.posix.firewalld:
    rich_rule: >-
      rule family=ipv4 source address={{ lan_cidr }} port
      port={{ item.port }} protocol={{ item.protocol }} accept
    permanent: true
    immediate: true
    state: enabled
  loop: >-
    {{ infra_apps.values() | map(attribute='extra_ports', default=[])
       | list | flatten | unique | list }}
  loop_control:
    label: "{{ item.port }}/{{ item.protocol }}"

- name: Open Paperless-ngx to the LAN
  ansible.posix.firewalld:
    rich_rule: >-
      rule family=ipv4 source address={{ lan_cidr }} port
      port=8000 protocol=tcp accept
    permanent: true
    immediate: true
    state: enabled

- name: Open NetBox to the LAN
  ansible.posix.firewalld:
    rich_rule: >-
      rule family=ipv4 source address={{ lan_cidr }} port
      port=8080 protocol=tcp accept
    permanent: true
    immediate: true
    state: enabled

- name: Open Immich to the LAN
  ansible.posix.firewalld:
    rich_rule: >-
      rule family=ipv4 source address={{ lan_cidr }} port
      port=2283 protocol=tcp accept
    permanent: true
    immediate: true
    state: enabled

- name: Calculate infra services whose rendered configuration changed
  ansible.builtin.set_fact:
    infra_services_to_restart: >-
      {{
        (
          infra_quadlet_templates.results
          | selectattr('changed')
          | map(attribute='item.key')
          | list
        )
        + (['beszel-agent'] if (infra_beszel_agent_template.changed | default(false)) else [])
        + (['paperless-redis', 'paperless'] if (infra_paperless_network.changed | default(false)) else [])
        + (['paperless-redis'] if (infra_paperless_redis_template.changed | default(false)) else [])
        + (['paperless'] if (infra_paperless_template.changed | default(false)) else [])
        + (['netbox-db', 'netbox-redis', 'netbox'] if (infra_netbox_network.changed | default(false)) else [])
        + (['netbox-db'] if (infra_netbox_db_template.changed | default(false)) else [])
        + (['netbox-redis'] if (infra_netbox_redis_template.changed | default(false)) else [])
        + (['netbox'] if (infra_netbox_template.changed | default(false)) else [])
        + (['immich-db', 'immich-redis', 'immich-server'] if (infra_immich_network.changed | default(false)) else [])
        + (['immich-db'] if (infra_immich_db_template.changed | default(false)) else [])
        + (['immich-redis'] if (infra_immich_redis_template.changed | default(false)) else [])
        + (['immich-server'] if (infra_immich_server_template.changed | default(false)) else [])
      }}
  changed_when: infra_services_to_restart | length > 0
  notify: infra configuration changed
