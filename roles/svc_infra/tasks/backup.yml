---
- name: Ensure the infra backup directory exists as the service UID
  ansible.builtin.command:
    argv:
      - setpriv
      - "--reuid={{ svc_uid }}"
      - "--regid={{ svc_gid }}"
      - --clear-groups
      - --
      - mkdir
      - -p
      - "/srv/backups/{{ inventory_hostname }}"
    creates: "/srv/backups/{{ inventory_hostname }}"

- name: Render the infra backup program
  ansible.builtin.template:
    src: backup-infra-appdata.sh.j2
    dest: /usr/local/sbin/backup-infra-appdata.sh
    owner: root
    group: root
    mode: "0755"

- name: Install the infra backup service unit
  ansible.builtin.copy:
    src: backup-infra-appdata.service
    dest: /etc/systemd/system/backup-infra-appdata.service
    mode: "0644"
  notify: reload systemd

- name: Install the infra backup timer
  ansible.builtin.copy:
    src: backup-infra-appdata.timer
    dest: /etc/systemd/system/backup-infra-appdata.timer
    mode: "0644"
  notify: reload systemd

- name: Arm nightly infra appdata backup
  ansible.builtin.systemd:
    name: backup-infra-appdata.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Check for fresh nonempty catalog backup artifacts
  ansible.builtin.shell: |
    set -euo pipefail
    [[ -d /srv/backups/{{ inventory_hostname }} ]] || exit 0
    find /srv/backups/{{ inventory_hostname }} -maxdepth 1 -type f -size +0c -mtime -2 \
      -name {{ (item ~ '-*.tar.gz') | quote }} -print -quit
  args:
    executable: /bin/bash
  loop: >-
    {{
      (
        (infra_apps | dict2items | map(attribute='value.backup_paths') | list | flatten)
        + infra_extra_backup_paths
      ) | unique | list
    }}
  loop_control:
    label: "{{ item }}"
  register: infra_backup_artifacts_before
  changed_when: false
  check_mode: false

- name: Check for fresh nonempty database dumps
  ansible.builtin.shell: |
    set -euo pipefail
    [[ -d /srv/backups/{{ inventory_hostname }}/db ]] || exit 0
    find /srv/backups/{{ inventory_hostname }}/db -maxdepth 1 -type f -size +0c -mtime -2 \
      -name {{ (item ~ '-*.sql.gz') | quote }} -print -quit
  args:
    executable: /bin/bash
  loop: "{{ infra_db_backups }}"
  loop_control:
    label: "{{ item }}"
  register: infra_db_artifacts_before
  changed_when: false
  check_mode: false

- name: Produce an initial infra backup when any catalog artifact is absent
  ansible.builtin.systemd:
    name: backup-infra-appdata.service
    state: started
  when:
    - not ansible_check_mode
    - >-
      (infra_backup_artifacts_before.results
       | selectattr('stdout', 'equalto', '') | list | length > 0)
      or (infra_db_artifacts_before.results
          | selectattr('stdout', 'equalto', '') | list | length > 0)
  changed_when: true
