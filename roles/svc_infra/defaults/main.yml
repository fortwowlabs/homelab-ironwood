---
# Bespoke multi-container services (a database/cache sidecar) aren't in the
# single-container infra_apps catalog (inventory/group_vars/all/infra-apps.yml)
# — each such service's branch appends a `+ ([...] if condition else [])`
# clause here so apps.yml/verify.yml/backup.yml still cover it uniformly,
# without needing to know which category a service belongs to. See
# roles/svc_media/tasks/files.yml + apps.yml for the equivalent hand-maintained
# pattern (media_quadlet_catalog there mixes catalog and bespoke entries).
infra_extra_service_names: >-
  {{ (['beszel-agent'] if beszel_agent_enabled | bool else [])
     + ['paperless-redis', 'paperless']
     + ['netbox-db', 'netbox-redis', 'netbox']
     + ['immich-db', 'immich-redis', 'immich-server'] }}

# Backup coverage for bespoke (non-catalog) services with real data worth
# keeping — appended the same way as infra_extra_service_names above.
# Excluded on purpose: beszel-agent/paperless-redis/netbox-redis (no real
# state), and netbox-db — postgres's data dir is owned by the image's
# internal postgres user, which rootless podman maps to a subuid the
# homelab-run tar can't read (same class as the paperless-redis issue), and
# a raw datadir tar isn't a consistent DB backup anyway. NetBox's
# authoritative data therefore is NOT in the nightly tar yet; a proper
# pg_dump-based backup (mirroring backup-media.sh's romm-db mariadb-dump) is
# a documented future enhancement. The netbox/ appdata that IS backed up is
# just uploaded media/reports/scripts (homelab-owned via the User=0 quadlet).
# Immich is likewise absent here: the photo library lives on the NFS media
# export (/srv/media/photos, backed up at the NAS layer, not in this tar) and
# its postgres data dir is subuid-owned (same pg_dump-future-enhancement caveat
# as netbox-db); immich-redis is a disposable queue/cache.
infra_extra_backup_paths: [paperless, netbox]

# Every infra service, whether catalog-driven or bespoke, funnels through
# this one name list so apps.yml/verify.yml don't need to know which category
# a service belongs to. A plain default (not set_fact) so it's available
# however the role is entered — including standalone `verify.yml`, which only
# runs tasks_from: verify and never executes files.yml.
infra_service_names: "{{ (infra_apps.keys() | list) + infra_extra_service_names }}"
