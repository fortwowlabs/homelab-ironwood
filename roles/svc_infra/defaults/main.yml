---
# Bespoke multi-container services (a database/cache sidecar) aren't in the
# single-container infra_apps catalog (inventory/group_vars/all/infra-apps.yml)
# — each such service's branch appends a `+ ([...] if condition else [])`
# clause here so apps.yml/verify.yml/backup.yml still cover it uniformly,
# without needing to know which category a service belongs to. See
# roles/svc_media/tasks/files.yml + apps.yml for the equivalent hand-maintained
# pattern (media_quadlet_catalog there mixes catalog and bespoke entries).
infra_extra_service_names: >-
  {{ (['beszel-agent'] if beszel_agent_enabled | bool else [])
     + ['paperless-redis', 'paperless']
     + ['netbox-db', 'netbox-redis', 'netbox']
     + ['immich-db', 'immich-redis', 'immich-server'] }}

# Appdata-tar backup coverage for bespoke (non-catalog) services — appended
# the same way as infra_extra_service_names above. Excluded on purpose:
# beszel-agent/paperless-redis/netbox-redis (no real state), and the Postgres
# data dirs (netbox-db/immich-db) — those are subuid-owned so the homelab tar
# can't read them, and a raw datadir tar isn't a consistent DB backup anyway.
# The databases are instead captured by application-consistent pg_dumpall (see
# infra_db_backups below). The netbox/ appdata that IS tarred here is just
# uploaded media/reports/scripts (homelab-owned via the User=0 quadlet); the
# Immich photo library lives on the NFS media export (/srv/media/photos, backed
# up at the NAS layer, not in this tar); immich-redis is a disposable cache.
infra_extra_backup_paths: [paperless, netbox]

# Bespoke Postgres databases captured by an application-consistent pg_dumpall
# via `podman exec` in the nightly backup (mirrors backup-media.sh's romm-db
# mariadb-dump). Each name is the container name AND the .sql.gz artifact base
# name; the dump reads POSTGRES_USER/POSTGRES_DB from the container's own env,
# so nothing here needs the db/user spelled out. pg_dumpall --clean --if-exists
# captures roles+globals and restores over an existing cluster; it is also the
# form Immich's backup docs specify for its vectorchord-patched cluster.
infra_db_backups: [netbox-db, immich-db]

# Every infra service, whether catalog-driven or bespoke, funnels through
# this one name list so apps.yml/verify.yml don't need to know which category
# a service belongs to. A plain default (not set_fact) so it's available
# however the role is entered — including standalone `verify.yml`, which only
# runs tasks_from: verify and never executes files.yml.
infra_service_names: >-
  {{ (infra_apps.keys() | list)
     + ((infra_secret_apps | default({})).keys() | list)
     + infra_extra_service_names }}
