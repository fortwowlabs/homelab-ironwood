---
# The pve_vm role talks to the Proxmox API (token, no root password) for VM
# lifecycle, but a few operations must touch thurgadin's filesystem (rendering
# the cloud-init snippet, image fetch/verify, disk resize). Those delegate
# over SSH to this target. Set to an SSH alias/user@host that reaches root on
# thurgadin. There is intentionally no role fallback for this value.
pve_ssh_host: "root@192.168.1.10"

# TLS validation is fail-closed. Trust the PVE CA on the controller as
# documented in docs/deployment.md; do not turn this off for routine use.
pve_validate_certs: true

# v5: resource pool the service VMs are created in. Create it once
# (see all_vault.yml.example header) — the scoped API token's VM rights
# live on this pool. Comment out to create VMs outside any pool (then the
# token needs VM rights elsewhere, e.g. /vms).
pve_vm_pool: homelab-svc

# v5: `-e pve_reconcile=true` (or `make reconcile`) pushes cores/memory/
# onboot/startup from host_vars onto EXISTING VMs. Off by default so a
# routine converge can never surprise-reconfigure a running VM.
pve_reconcile: false
