---
# Infra-stack source of truth (v6, svc-infra). Mirrors download_apps
# (inventory/group_vars/all/apps.yml): every generic-quadlet consumer
# (Quadlet render, service start/verify, nightly backup) derives from this
# catalog — a new single-container service is a catalog entry, not new role
# code. Multi-container services (a database or cache sidecar) get a bespoke
# per-service quadlet template instead (see roles/svc_media/templates/
# romm.container.j2 + romm-db.container.j2 for that pattern) and are NOT
# listed here — only genuinely single-container apps use the generic
# infra-app.container.j2 template driven by this dict.
#
# Per-entry fields consumed by roles/svc_infra:
#   image         immutable pinned reference (tag or @sha256 digest — never
#                 :latest, matching download_apps/media_images convention)
#   ui_port       host-side TCP port; the generic quadlet publishes it on
#                 svc-infra's LAN IP, not loopback — Caddy runs on
#                 {{ media_host }}, a different host (added to
#                 caddy_services per service to reach it)
#   container_port  optional; the image's internal port if it differs from
#                 ui_port (defaults to ui_port; ignored when network_mode: host)
#   network_mode  optional; set to "host" for a service that needs the real
#                 host network namespace (e.g. Syncthing's LAN peer
#                 discovery breaks inside container-NAT'd networking) —
#                 skips PublishPort entirely, every port just IS a host
#                 port. Otherwise omit for normal per-port publishing.
#   extra_ports   optional list of {port, protocol} opened via firewalld
#                 (and, unless network_mode: host, also published)
#                 alongside ui_port — for services with a non-HTTP protocol
#                 port (e.g. Syncthing's sync/discovery ports). NOT reached
#                 through Caddy, only opened to lan_cidr directly.
#   volumes       list of Quadlet Volume= lines (bind mounts under
#                 /opt/homelab/appdata/<name>, owned by svc_uid/svc_gid)
#   env           optional dict of Environment= key/value pairs
#   backup_paths  appdata subdirectory names (relative to
#                 /opt/homelab/appdata) included in the nightly backup tar
infra_apps:
  uptime-kuma:
    image: "docker.io/louislam/uptime-kuma@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985"
    ui_port: 3001
    volumes:
      - /opt/homelab/appdata/uptime-kuma/data:/app/data:Z
    backup_paths: [uptime-kuma]

  syncthing:
    image: "docker.io/syncthing/syncthing@sha256:4464f4161dd0251e20d46bb3aec83363db75d80cef1abdd5d5fd4054b04a004d"
    ui_port: 8384
    network_mode: host
    volumes:
      - /opt/homelab/appdata/syncthing:/var/syncthing:Z
    env:
      # Rootless podman maps container-internal UID 0 directly to the
      # invoking host user (homelab) — the same trick as seerr.container.j2's
      # User=0 fix. Any NON-zero PUID/PGID (e.g. svc_uid) instead goes through
      # the subuid range, so files land owned by an opaque high host UID that
      # svc_uid/svc_gid-based backup/read tasks can't touch. Force root.
      PUID: "0"
      PGID: "0"
    extra_ports:
      - { port: 22000, protocol: tcp }
      - { port: 22000, protocol: udp }
      - { port: 21027, protocol: udp }
    backup_paths: [syncthing]

  # Beszel monitoring hub. Agents (one per VM, including this one) are
  # bespoke quadlets, not catalog entries — see roles/*/templates/
  # beszel-agent.container.j2 in svc_infra/svc_media/svc_download. The hub
  # itself needs no manual setup to deploy; the *agents* need a one-time
  # universal token + public key from the hub's own UI (see
  # docs/services.md "Beszel monitoring setup") before they'll start.
  beszel-hub:
    image: "docker.io/henrygd/beszel@sha256:a849ad80814b6a1a3be665304dcace5d4854b3bed7bde4dd1227e8ce1b82d477"
    ui_port: 8090
    volumes:
      - /opt/homelab/appdata/beszel-hub/data:/beszel_data:Z
    env:
      APP_URL: "https://beszel.{{ service_domain }}"
    backup_paths: [beszel-hub]

  # Bambu Lab printer management. Host networking is required by its
  # "virtual printer" SSDP/MQTT/RTSP emulation feature (a wide, non-HTTP
  # port set); THIS deploy only opens the web UI (ui_port) — the virtual
  # printer feature's extra ports (3000/3002/8883/990/6000/322/2024-2026/
  # 50000-50029) are deliberately NOT wired up (a large firewalld surface
  # for a feature most setups won't use for real printers on the LAN;
  # revisit if you actually want SSDP-discoverable virtual printers).
  bambuddy:
    image: "ghcr.io/maziggy/bambuddy@sha256:d68ab4746f18c51a6e22f5cd536533a4ae3c1eb48f4eecccbb68c2be23d0ef52"
    # 8000 is already Paperless-ngx's port on this host; with host networking
    # every catalog app on svc-infra shares one port namespace, so Bambuddy's
    # own PORT env var is moved to 8001 to avoid the collision.
    ui_port: 8001
    network_mode: host
    volumes:
      - /opt/homelab/appdata/bambuddy/data:/app/data:Z
      - /opt/homelab/appdata/bambuddy/logs:/app/logs:Z
    env:
      # See the Syncthing entry above for why PUID/PGID must be 0, not
      # svc_uid, under rootless podman.
      PUID: "0"
      PGID: "0"
      PORT: "8001"
    backup_paths: [bambuddy]

  # Home Assistant. Published on 8123 only (no host networking under rootless
  # podman) — auto-discovery of LAN devices via mDNS/SSDP is therefore
  # limited; integrations added by IP work fine. Revisit host networking if
  # the user needs zeroconf discovery later. The image runs as container-root
  # by default, which under rootless podman maps to the host homelab user, so
  # /config stays writable and backup-readable without a PUID/PGID override.
  home-assistant:
    image: "ghcr.io/home-assistant/home-assistant@sha256:6937c6c51d2f5d6aa66d97e4a68f845bcccd5f9b62cd91992bd6d79b20fe2b3c"
    ui_port: 8123
    volumes:
      - /opt/homelab/appdata/home-assistant:/config:Z
    backup_paths: [home-assistant]

  # IT Tools (https://it-tools.tech/) — a static/stateless collection of
  # developer utilities (JSON/base64/regex/hash tools etc). No volumes, no
  # env, no backup: nothing it renders is ever persisted server-side.
  it-tools:
    image: "ghcr.io/corentinth/it-tools@sha256:8b8128748339583ca951af03dfe02a9a4d7363f61a216226fc28030731a5a61f"
    ui_port: 8082
    container_port: 80
    volumes: []
    backup_paths: []

  # Glances — host monitoring, web UI/REST API, and (per the LLM-TODO-LIST
  # ask "configured such that tools like yourself can connect to it") its
  # built-in MCP server: http://<svc-infra-ip>:61208/mcp/sse (see
  # caddy_services.glances in main.yml for why that needs a Caddy
  # host_header rewrite).
  #
  # Deliberately NOT pid_mode: host: CPU/memory/disk come from /proc/stat and
  # /proc/meminfo, which are already host-wide inside any container (they
  # aren't PID-namespace-scoped) — confirmed live. What pid_mode: host would
  # ADD is the full host process list, at a real cost: every rootless
  # container on this VM runs as the same UID (homelab/svc_uid), so sharing
  # the host PID namespace lets ANY process in this container read
  # /proc/<pid>/environ for every sibling container — confirmed live (read
  # NetBox's live DB_PASSWORD from inside glances this way during review).
  # Not worth trading real, standing secret exposure for a process list.
  #
  # Deliberately NOT wired to the Podman API socket either (no container-
  # level stats): tried bind-mounting /run/user/<uid>/podman(.sock) with
  # DOCKER_HOST pointed at it, but the container's mapped UID (confirmed via
  # /proc/<pid>/uid_map: container 0 -> host svc_uid, matching the socket's
  # real owner) still gets a plain EACCES connecting to it — no SELinux
  # denial either (checked with dontaudit disabled) — root cause not
  # resolved. Not worth chasing further: the security review had already
  # flagged that a `:ro` bind mount doesn't limit what RPCs a live socket
  # connection can issue (blast radius on a Glances compromise = control of
  # every container on this host), so dropping it entirely is the right
  # outcome anyway, not just a workaround for the permission issue.
  glances:
    image: "docker.io/nicolargo/glances@sha256:58651aabedf62db8bfc1d252f8d3889675dfcdb5d0ad1c177ae5879c21626f3a"
    ui_port: 61208
    volumes: []
    env:
      GLANCES_OPT: "-w --enable-mcp"
    backup_paths: []

# Secret-bearing single-container services. Structurally identical to
# infra_apps (same fields, same infra-app.container.j2 template, same
# firewalld/service-name/backup wiring) with two differences handled in
# roles/svc_infra: (1) their Quadlet is rendered by a no_log/diff:false
# task and written mode 0600, because an `env` value here is a real secret
# (a vault var) and the shared infra_apps render loop is deliberately NOT
# no_log-wrapped (it would blank the diff for every ordinary service too);
# (2) each entry lists the vault var(s) it needs in `require_vault`, which a
# single generic assert checks are non-empty before rendering — the generic
# form of paperless/netbox's per-service "Require the secret key" assert.
# Use this (not a new bespoke template) for any single-container service
# whose only reason for not being a plain infra_apps entry is an embedded
# secret. Multi-container secret services (db/cache sidecar) still get a
# bespoke template — see paperless/netbox/immich.
infra_secret_apps:
  # code-server — VS Code in the browser (Open VSX extension marketplace
  # works out of the box, satisfying the "must support plugins/extensions"
  # requirement). PASSWORD gates the web UI. PUID/PGID=0 so /config lands
  # homelab-owned under rootless podman (same reason as Syncthing/Bambuddy).
  code-server:
    image: "lscr.io/linuxserver/code-server@sha256:691c8e0560a807a4affefbcf7e729716b372d1df7c57e18ed3a263044cf45908"
    ui_port: 8443
    volumes:
      - /opt/homelab/appdata/code-server:/config:Z
    env:
      PUID: "0"
      PGID: "0"
      PASSWORD: "{{ vault_codeserver_password }}"
      DEFAULT_WORKSPACE: /config/workspace
    require_vault: [vault_codeserver_password]
    backup_paths: [code-server]

  # Semaphore UI — web frontend for running Ansible/Terraform/etc (could even
  # drive this very repo; wiring that up is a manual follow-up, not automated
  # here). Embedded SQLite (SEMAPHORE_DB_DIALECT=sqlite — bolt is deprecated
  # and now returns "not supported" upstream), so no database sidecar. The
  # official image bakes USER=1001, which under rootless podman can't write
  # the homelab-owned /var/lib/semaphore + /etc/semaphore binds; it exposes
  # no PUID knob, so force User=0 (→ homelab) via the quadlet instead.
  # SEMAPHORE_ACCESS_KEY_ENCRYPTION (base64 32 bytes) encrypts the secrets
  # Semaphore stores (SSH keys, vault passwords) — must stay stable across
  # restarts or those become unreadable, hence a vault var, not autogenerated
  # per-boot by the image.
  semaphore:
    image: "docker.io/semaphoreui/semaphore@sha256:6454b2e58a6616de82240f7b4f271663fe0ec3430e10a9cc7e763ff6df12baa0"
    ui_port: 3000
    user: "0"
    volumes:
      - /opt/homelab/appdata/semaphore/lib:/var/lib/semaphore:Z
      - /opt/homelab/appdata/semaphore/etc:/etc/semaphore:Z
    env:
      SEMAPHORE_DB_DIALECT: sqlite
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_NAME: Admin
      SEMAPHORE_ADMIN_EMAIL: "admin@{{ service_domain }}"
      SEMAPHORE_ADMIN_PASSWORD: "{{ vault_semaphore_admin_password }}"
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: "{{ vault_semaphore_access_key_encryption }}"
    require_vault:
      - vault_semaphore_admin_password
      - vault_semaphore_access_key_encryption
    backup_paths: [semaphore]

  # Webtop — a full XFCE Linux desktop in the browser (LinuxServer/KasmVNC).
  # CUSTOM_USER + PASSWORD gate the web UI with HTTP basic auth. Published on
  # its HTTP port 3000 (container) → host 3003 (3000 is Semaphore, 3001 is
  # Uptime Kuma); Caddy terminates TLS in front, so the browser still gets
  # HTTPS (KasmVNC needs a secure context for clipboard etc). PUID/PGID=0 →
  # /config lands homelab-owned (Syncthing/Bambuddy pattern). shm_size: 1g
  # per LSIO's desktop guidance (the 64M default crashes GUI apps).
  #
  # LSIO's "privileged access to the host / passwordless sudo in the terminal"
  # warning is written for ROOTFUL docker, where container-root == host-root.
  # Here it's rootless podman: container-root maps to the unprivileged homelab
  # uid, no --privileged, no seccomp=unconfined — the desktop's "root" is
  # contained to homelab exactly like code-server's terminal already is, and
  # it's LAN-only + password-gated. Same accepted trust model, no host escape.
  webtop:
    image: "lscr.io/linuxserver/webtop@sha256:2caa5d4e469994bcc1fe969587a7016d837bc4c0c5ebf559699c9cabb4cbc5ee"
    ui_port: 3003
    container_port: 3000
    shm_size: 1g
    volumes:
      - /opt/homelab/appdata/webtop:/config:Z
    env:
      PUID: "0"
      PGID: "0"
      CUSTOM_USER: admin
      PASSWORD: "{{ vault_webtop_password }}"
    require_vault: [vault_webtop_password]
    backup_paths: [webtop]
