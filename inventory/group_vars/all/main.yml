---
# ============================================================================
# Environment facts (audited 2026-05-31; image pin refreshed 2026-07-15).
# Non-secret — safe in git. Secrets live in group_vars/all_vault.yml
# (ansible-vault encrypted).
# ============================================================================

# --- Network / identity ---
lan_gateway:     192.168.1.1
lan_dns:         192.168.1.1
lan_cidr:        192.168.1.0/24     # admin scope (deliberate: whole flat LAN)
admin_user:      straderb
svc_uid:         10001
svc_gid:         10001
timezone:        America/New_York

# --- Unmanaged storage host ---
# Managed host addresses live only in inventory/hosts.yml (`ansible_host` for
# service VMs and `pve_api_host` for thurgadin).
truenas_ip: 192.168.1.20

# --- Service VM identity (v6) ---
# `download_host`/`media_host`/`infra_host` resolve to whichever
# inventory_hostname is a member of the download_vms/media_vms/infra_vms
# child groups (inventory/hosts.yml) — use these (or
# `hostvars[download_host]`/`hostvars[media_host]`/`hostvars[infra_host]`)
# instead of a literal "svc-download"/"svc-media"/"svc-infra" so renaming a
# host in inventory is a single edit. See docs/operations.md.
download_host: "{{ groups['download_vms'] | first }}"
media_host:    "{{ groups['media_vms'] | first }}"
infra_host:    "{{ groups['infra_vms'] | first }}"

# --- TrueNAS NFS (created by hand in Phase 1 — NOT automated) ---
# These live INSIDE the exported `tank` dataset (exports are tank + rust;
# verify with `showmount -e 192.168.1.20`).
nfs_media_export:   "/mnt/sata_wd_14tb/tank/media"
nfs_backups_export: "/mnt/sata_wd_14tb/tank/backups"
nfs_opts: "hard,nofail,x-systemd.automount,x-systemd.mount-timeout=30"
service_nfs_mounts:
  - { path: /srv/media, export: "{{ nfs_media_export }}" }
  - { path: /srv/backups, export: "{{ nfs_backups_export }}" }

# --- Proxmox storage (from /etc/pve/storage.cfg) ---
pve_storage:         nvme0pool           # VM disks
pve_snippet_storage: local
pve_snippet_dir:     /var/lib/vz/snippets
pve_image_dir:       /var/lib/vz/template/cache
pve_bridge:          vmbr0
# EL10 userspace is x86-64-v3; PVE default (v2-AES) won't boot it. 'host' on
# the 3700X (Zen 2) qualifies. Use x86-64-v3 instead only for live migration.
pve_cpu_type:        host

# --- Rocky 10 GenericCloud image — PINNED (v5) --------------------------
# Pin a DATED build, never the mutable `.latest` symlink. The SHA-256 below is
# committed with the filename and the PVE role hashes the actual image bytes
# on every run; no stamp file is trusted.
#
# BUMP PROCEDURE (deliberate, not automatic):
#   1. Browse https://dl.rockylinux.org/pub/rocky/10/images/x86_64/
#   2. Verify the signed Rocky CHECKSUM and update all three values below.
#   3. Preserve or remove the old cached image only during planned maintenance.
#   4. Note: Rocky prunes dated images of the PREVIOUS minor when a new one
#      lands, so a stale pin eventually 404s — that is your cue to bump.
rocky_image_name: "Rocky-10-GenericCloud-Base-10.2-20260525.0.x86_64.qcow2"
rocky_image_url:  "https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base-10.2-20260525.0.x86_64.qcow2"
rocky_image_sha256: "9fc9e9ff16888bb68ac39b0392e25c9c92684d50c85f1cce6ab549363bbc4b48"

# --- Admin SSH key injected into both VMs (public key CONTENT, not a path) ---
# Paste your MBP ed25519 public key here (safe — it's a public key):
admin_ssh_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMjZAEI+FfdW74JRrWjUbSK9HmF7AVHaa8qlYsN9YSLB straderb@Mac.fort.wow"

# --- Mullvad in-tunnel DNS (public constant, not a secret) ---
mullvad_dns: "10.64.0.1"

# --- Beszel monitoring agent (v6) -----------------------------------------
# One agent per VM (svc-download, svc-media, svc-infra), all reporting to
# the beszel-hub catalog entry on svc-infra. Bespoke per-role quadlets, not
# an infra_apps entry, since agents need no published port and svc-download's
# needs to run rootful in the init ns (not the download_apps VPN jail).
# vault_beszel_token/vault_beszel_key can only be generated by visiting the
# hub's UI once after it first deploys — see docs/services.md "Beszel
# monitoring setup". Until filled in, every agent skips itself with a
# WARNING instead of failing the deploy (matching the ntfy_url pattern).
beszel_agent_image: "docker.io/henrygd/beszel-agent@sha256:8874e2c53f9de5e063a6a80d6b617e20fa593ac5dc4eb4c6ce1f912f510f38f8"
beszel_agent_enabled: >-
  {{ (vault_beszel_token | default('')) | length > 0
     and (vault_beszel_key | default('')) | length > 0 }}

# --- Recyclarr (v6, download jail) -----------------------------------------
# TRaSH-Guides sync for Sonarr/Radarr. Bespoke, not a download_apps entry:
# the official image doesn't support PUID/PGID (needs Podman User= instead)
# and its config embeds API keys read live off Sonarr/Radarr's own
# config.xml, so its Quadlet render must be no_log-wrapped (see
# roles/svc_download/tasks/files.yml). Self-disables (WARNs instead of
# failing) until Sonarr and Radarr have both started at least once and
# generated a config.xml — same "skip cleanly until the prerequisite
# exists" shape as beszel_agent_enabled above.
recyclarr_image: "ghcr.io/recyclarr/recyclarr@sha256:2d6107f758d882a59fe9d646aa54fa8a5a4fb7a40995125fade575652a3f7871"

# --- ntfy: where deploy results are pushed. ------------------------------
# Default is the LAN-internal ntfy you'll stand up on svc-media (Phase 9).
# FIRST RUN: that ntfy does not exist yet. Either point this at
# https://ntfy.sh with a long random topic for bootstrap, or accept that
# the push fails — v5 prints a loud WARNING in the play output instead of
# swallowing it (v4 was silent). The svc-download leak canary alerts to
# this same target; the host backstop opens egress to it automatically
# when the ntfy host is the canonical svc-media inventory address.
ntfy_url:   "http://{{ hostvars[media_host].ansible_host }}:8080"
ntfy_topic: "homelab-deploy"

# --- svc-media access layer -----------------------------------------------
# caddy  = deploy the Caddy reverse proxy for *.{{ service_domain }} (internal-CA TLS).
# manual = role stops at "containers healthy on the LAN"; you run Caddy by hand.
# (v6: Tailscale removed from svc-media — remote access is via the subnet router.)
media_access_layer: caddy

# --- Service naming (v6) --------------------------------------------------
# Every service is reachable at https://<key>.{{ service_domain }} instead of
# an IP:port. Caddy on svc-media is the single reverse proxy (internal-CA TLS);
# dnsmasq on svc-media answers *.{{ service_domain }} -> its ansible_host. pfSense
# forwards the domain to it and Tailscale split-DNS does the same for the
# tailnet — both one-time; see docs/services.md and docs/deployment.md.
#
# This catalog is the source of truth for media and infrastructure endpoints.
# Download endpoints are derived from download_apps, so their ports and
# dashboard metadata are never duplicated here.
#   backend         host:port Caddy proxies to (127.0.0.1 = on svc-media)
#   scheme          optional, default http (set to https for TLS backends)
#   tls_skip_verify optional bool, for self-signed https backends
service_domain: fort.wow

# cloud-init's guest FQDN/resolv search domain. A distinct knob (pve_vm
# consumes it, not Caddy/dnsmasq) but follows service_domain by default since
# in practice they're the same private TLD — override only if you deliberately
# want the guest OS's search domain to differ from the service naming domain.
search_domain: "{{ service_domain }}"

# group/icon are used by the Homepage dashboard; Caddy/dnsmasq ignore them.
caddy_services:
  # Jellyfin publishes only on svc-media's LAN address, not loopback.
  jellyfin:   { backend: "{{ hostvars[media_host].ansible_host }}:8096", group: Media, icon: jellyfin }
  abs:        { backend: "127.0.0.1:13378",            group: Media,     icon: audiobookshelf }
  romm:       { backend: "127.0.0.1:8081",             group: Media,     icon: romm }
  seerr:      { backend: "127.0.0.1:5055",             group: Media,     icon: overseerr }
  calibre-web: { backend: "127.0.0.1:8083",            group: Media,     icon: calibre-web }
  # monitoring (feat/monitoring): Cockpit serves its own self-signed TLS
  home:          { backend: "127.0.0.1:3000",          group: Infra, icon: homepage }
  ntfy:          { backend: "{{ hostvars[media_host].ansible_host }}:8080", group: Infra, icon: ntfy }
  cockpit-media: { backend: "127.0.0.1:9090",          group: Infra, icon: cockpit, scheme: https, tls_skip_verify: true }
  cockpit-dl:    { backend: "{{ hostvars[download_host].ansible_host }}:9090", group: Infra, icon: cockpit, scheme: https, tls_skip_verify: true }
  cockpit-infra: { backend: "{{ hostvars[infra_host].ansible_host }}:9090", group: Infra, icon: cockpit, scheme: https, tls_skip_verify: true }
  # infra_apps catalog services (svc-infra) — the backend is always
  # hostvars[infra_host].ansible_host, never 127.0.0.1: Caddy runs on
  # svc-media, a different host, so the generic infra Quadlet template
  # publishes each app on svc-infra's LAN IP (not loopback) for Caddy to
  # reach; the catalog's ui_port must match here.
  uptime-kuma: { backend: "{{ hostvars[infra_host].ansible_host }}:3001", group: Infra, icon: uptime-kuma }
  syncthing:   { backend: "{{ hostvars[infra_host].ansible_host }}:8384", group: Infra, icon: syncthing }
  beszel:      { backend: "{{ hostvars[infra_host].ansible_host }}:8090", group: Infra, icon: beszel }
  paperless:   { backend: "{{ hostvars[infra_host].ansible_host }}:8000", group: Infra, icon: paperless-ngx }
  bambuddy:    { backend: "{{ hostvars[infra_host].ansible_host }}:8001", group: Infra, icon: bambu-lab }
  netbox:      { backend: "{{ hostvars[infra_host].ansible_host }}:8080", group: Infra, icon: netbox }
  home-assistant: { backend: "{{ hostvars[infra_host].ansible_host }}:8123", group: Infra, icon: home-assistant }
  immich:      { backend: "{{ hostvars[infra_host].ansible_host }}:2283", group: Media, icon: immich }
  it-tools:    { backend: "{{ hostvars[infra_host].ansible_host }}:8082", group: Infra, icon: it-tools }
