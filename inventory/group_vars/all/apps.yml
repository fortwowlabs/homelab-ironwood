  audiobookshelf: "ghcr.io/advplyr/audiobookshelf@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d"
  romm: "docker.io/rommapp/romm@sha256:c81778afcafe7c865bdf156d1c62349aec3dfca3aca5ec0d6c2c2e8bfa9fb071"
  romm_db: "docker.io/library/mariadb@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4"
  seerr: "ghcr.io/seerr-team/seerr@sha256:c92d2dc117f62185e7bcb88cd56efd374ea79210eaf433275449e8d5988eb5a8"
  ntfy: "docker.io/binwiederhier/ntfy@sha256:a6d335064ae927c4dbef118e1fa39656b3d2e01472b2a82af5915d5cebfe815f"
  homepage: "ghcr.io/gethomepage/homepage@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28"
  # Calibre-Web Automated (crocodilestick) — LSIO-based ebook library +
  # auto-ingest. Pinned to v4.0.6.
  calibre_web_automated: "ghcr.io/crocodilestick/calibre-web-automated@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d"

# Paperless-ngx (svc-infra) — bespoke two-container app (webserver + its
# own redis broker), same reasoning as media_images above.
paperless_images:
  webserver: "docker.io/paperlessngx/paperless-ngx@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f"
  redis: "docker.io/library/redis@sha256:234c902a2db49461a129e2d4aeff85b28cf20187ed274a67f6e50995fa713c7b"

# NetBox (svc-infra) — bespoke three-container app. Upstream's own compose
# runs 5 containers (webserver + worker + postgres + 2 valkey instances);
# simplified here to 3: the worker (background jobs: webhooks, scheduled
# reports) is skipped as out of scope for core CRUD/IPAM use, and one
# valkey instance serves both the main and cache roles via different
# REDIS_DATABASE numbers instead of two separate containers.
netbox_images:
  webserver: "docker.io/netboxcommunity/netbox@sha256:691ec1a4f569f3dfb9fefd9f086cca1b39689ad59c3eae753712a741447e5e60"
  postgres: "docker.io/library/postgres@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15"
  redis: "docker.io/valkey/valkey@sha256:c9b77919daeba2c02ad954d0c844cc4e7142069d177b89c5fd771f405daf9e02"
