---
# Download-stack source of truth. Every consumer (Quadlet, socket proxy,
# firewall, image pull, backup, canary and verification) derives from this map.
# Image references are immutable manifests reviewed during the 2026-07 refactor.
download_apps:
  sabnzbd:
    image: "lscr.io/linuxserver/sabnzbd@sha256:b67039e6739c2379f2eac8901248cdfcd78536ee34fe6948faea6b8ce8b4805b"
    ui_port: 8080
    volumes:
      - /srv/appdata/sabnzbd:/config:Z
      - /var/lib/sabnzbd-incomplete:/incomplete-downloads:Z
      - /srv/media:/data
    media_mount: true
    backup_paths: [sabnzbd]
    dashboard: { group: Downloads, icon: sabnzbd }
    proxy: true

  prowlarr:
    image: "lscr.io/linuxserver/prowlarr@sha256:4fd7a166c8f46dd3370a871c250ee577d6c2ae97a0dbe0e3614b5ef736205620"
    ui_port: 9696
    volumes: [/srv/appdata/prowlarr:/config:Z]
    media_mount: false
    backup_paths: [prowlarr]
    dashboard: { group: Downloads, icon: prowlarr }
    proxy: true

  sonarr:
    image: "lscr.io/linuxserver/sonarr@sha256:24acea2956a0ccb11f103877d9f4f8576600fb34bff34820ed749c2256dab89f"
    ui_port: 8989
    volumes:
      - /srv/appdata/sonarr:/config:Z
      - /srv/media:/data
    media_mount: true
    backup_paths: [sonarr]
    dashboard: { group: Downloads, icon: sonarr }
    proxy: true

  radarr:
    image: "lscr.io/linuxserver/radarr@sha256:2b2c1c05eb3f648d2c80dfab9486147dd7bb0ad4d77fa972fc1c5de8f1da3738"
    ui_port: 7878
    volumes:
      - /srv/appdata/radarr:/config:Z
      - /srv/media:/data
    media_mount: true
    backup_paths: [radarr]
    dashboard: { group: Downloads, icon: radarr }
    proxy: true

  lazylibrarian:
    image: "lscr.io/linuxserver/lazylibrarian@sha256:bfa6da8414be2ebbcf3919cc951d8559dd2c8cec7c745ba4048c53d7d8af153d"
    ui_port: 5299
    volumes:
      - /srv/appdata/lazylibrarian:/config:Z
      - /srv/media:/data
    media_mount: true
    backup_paths: [lazylibrarian]
    dashboard: { group: Downloads, icon: lazylibrarian }
    proxy: true

  bazarr:
    image: "lscr.io/linuxserver/bazarr@sha256:4c30dc0bb9a5d223075e7f5d12c77bd293c4b460f86d696dbe64763104c1e88c"
    ui_port: 6767
    volumes:
      - /srv/appdata/bazarr:/config:Z
      - /srv/media:/data
    media_mount: true
    backup_paths: [bazarr]
    dashboard: { group: Downloads, icon: bazarr }
    proxy: true

# Media/infra images remain separate because their Quadlets are intentionally
