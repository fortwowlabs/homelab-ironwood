---
# svc-download — netns VPN jail + SAB/arr stack (flat LAN, no VLAN)
vm_id:      131
vm_cores:   4
vm_memory:  6144
vm_disk_gb: 160
vm_startup: "order=3,up=30"
service_guarded_egress: true
service_repo_packages: [epel-release]
service_packages:
  - wireguard-tools
  - podman
  - curl
  - nfs-utils
  - nftables
  - policycoreutils-python-utils
  - checkpolicy
  - cockpit
  - cockpit-podman
  - cockpit-storaged
vm_extra_packages:
  - wireguard-tools
  - podman
  - nfs-utils
  - policycoreutils-python-utils

# --- monitoring (mon role) ---
cockpit_origin:     cockpit-dl      # https://cockpit-dl.<domain>
mon_open_firewalld: false           # svc-download uses the nftables backstop (:9090 opened there)
