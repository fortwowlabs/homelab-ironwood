---
# svc-download — netns VPN jail + SAB/arr stack (flat LAN, no VLAN)
# This filename must match the inventory_hostname in inventory/hosts.yml's
# download_vms group — renaming that host means renaming this file too. See
# "Renaming a service VM" in docs/operations.md.
vm_id:      131
vm_cores:   6
vm_memory:  8192
vm_disk_gb: 160
# RAM bumped 6G->8G (2026-07-23) ahead of adding jdownloader to the jail —
# archive extraction is memory-spiky. Cores bumped 4->6 to match
# svc-infra/svc-media. thurgadin had ~20G free at resize time.
vm_startup: "order=3,up=30"
service_guarded_egress: true
service_repo_packages: [epel-release]
service_packages:
  - wireguard-tools
  - podman
  - curl
  - nfs-utils
  - nftables
  - policycoreutils-python-utils
  - checkpolicy
  - cockpit
  - cockpit-podman
  - cockpit-storaged

# --- monitoring (mon role) ---
cockpit_origin:     cockpit-dl      # https://cockpit-dl.<domain>
mon_open_firewalld: false           # svc-download uses the nftables backstop (:9090 opened there)
