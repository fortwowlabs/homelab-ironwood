---
# svc-media — rootless media stack (Jellyfin/ABS/RomM/Seerr) and LAN access
# This filename must match the inventory_hostname in inventory/hosts.yml's
# media_vms group — renaming that host means renaming this file too. See
# "Renaming a service VM" in docs/operations.md.
vm_id:      130
vm_cores:   6
vm_memory:  10240
vm_disk_gb: 100
# vm_cores bumped 4->6 (2026-07-23) to match svc-infra/svc-download after
# thurgadin RAM/CPU headroom was freed up.
vm_startup: "order=2,up=90"    # TrueNAS is order=1 (set once, out of band)
service_guarded_egress: false
service_requires_subids: true
service_repo_packages: [epel-release]
service_packages:
  - podman
  - nfs-utils
  - policycoreutils-python-utils
  - firewalld
  - python3-firewall
  - curl
  - bind-utils
  - dnsmasq
  - caddy
  - cockpit
  - cockpit-podman
  - cockpit-storaged
# Remote access is handled by the dedicated subnet-router VM, not this role.

# --- monitoring (mon role) ---
cockpit_origin:     cockpit-media   # https://cockpit-media.<domain>
mon_open_firewalld: true            # svc-media uses firewalld
