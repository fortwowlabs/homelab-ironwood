---
# Physical/logical hosts. The two service VMs won't answer SSH until pve_vm
# has created them — that's why site.yml provisions before configuring, and
# why plays that touch them use `gather_facts` lazily.
all:
  children:
    # Runs API calls against PVE. These plays target localhost (the control
    # node / your MBP) and talk to the PVE API over HTTPS — we do NOT need
    # SSH-as-root to thurgadin for VM creation, only the API token.
    pve:
      hosts:
        thurgadin:
          ansible_connection: local   # API-driven; see group_vars/pve.yml
          # Local tasks must run in the same python as ansible itself (the
          # .venv) — interpreter discovery would find Homebrew's python,
          # which lacks proxmoxer.
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          pve_api_host: 192.168.1.10
          pve_node: thurgadin

    # In-guest configuration targets. SSH as straderb, become root.
    #
    # Each host's `ansible_host` here is the SINGLE SOURCE OF TRUTH for that
    # VM's IP address. Everything else — the cloud-init static-IP config
    # rendered at provision time (roles/pve_vm), Caddy's reverse-proxy
    # backends and dnsmasq's DNS records (caddy_services in
    # group_vars/all/main.yml), the svc-download nftables backstop's allowed
    # peers, and ntfy_url — derives from `hostvars[...].ansible_host` rather
    # than a hardcoded address. Changing a value here re-IPs that VM on the
    # next fresh provision; `preflight.yml` asserts these are present and
    # unique before any run touches the VMs. Re-IPing an already-running VM
    # is an operational migration, not just an inventory edit — see
    # docs/operations.md.
    # v6: each role's own host is a one-member child group rather than a
    # hardcoded inventory_hostname literal. Roles, playbooks, the Makefile,
    # and templates target/derive from `download_vms` / `media_vms` (and the
    # `download_host` / `media_host` vars in group_vars/all/main.yml, which
    # resolve to whichever host is in the group) instead of the literal
    # names "svc-download"/"svc-media" — so renaming a host here is a single
    # edit. See docs/operations.md for the full renaming runbook; the live
    # deployment keeps these exact names.
    service_vms:
      children:
        download_vms:
          hosts:
            svc-download:
              ansible_host: 192.168.1.31
        media_vms:
          hosts:
            svc-media:
              ansible_host: 192.168.1.30
      vars:
        ansible_user: straderb
        ansible_become: true
        ansible_become_method: sudo
