---
# Safe, non-disruptive verification. Each role exposes a dedicated verify task
# entry point, so this playbook never depends on deployment tags.
- name: Verify every service VM without changing service state
  hosts: service_vms
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Run host verification with failure notification
      block:
        - name: Verify shared service VM invariants
          ansible.builtin.include_role:
            name: service_vm
            tasks_from: verify

        - name: Verify the host-specific service stack
          ansible.builtin.include_role:
            name: "{{ 'svc_download' if inventory_hostname == 'svc-download' else 'svc_media' }}"
            tasks_from: verify

        - name: Verify host monitoring
          ansible.builtin.include_role:
            name: mon
            tasks_from: verify
      rescue:
        - name: Notify verification failure
          ansible.builtin.include_role:
            name: notify
          vars:
            ntfy_title: "homelab VERIFY FAILED ({{ inventory_hostname }})"
            ntfy_result: "A safe verification gate failed on {{ inventory_hostname }}."
            ntfy_priority: urgent
            ntfy_tags: rotating_light

        - name: Abort after a failed safe verification
          ansible.builtin.fail:
            msg: "Safe verification failed on {{ inventory_hostname }}."

- name: Announce safe verification success only after every host is green
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert all host verification facts
      ansible.builtin.assert:
        that:
          - hostvars['svc-download'].service_vm_verified | default(false) | bool
          - hostvars['svc-download'].svc_download_verified | default(false) | bool
          - hostvars['svc-download'].mon_verified | default(false) | bool
          - hostvars['svc-media'].service_vm_verified | default(false) | bool
          - hostvars['svc-media'].svc_media_verified | default(false) | bool
          - hostvars['svc-media'].mon_verified | default(false) | bool
        fail_msg: "Refusing success: not every safe verification phase completed."

    - name: Send safe verification success notification
      ansible.builtin.include_role:
        name: notify
      vars:
        ntfy_title: homelab verify OK
        ntfy_result: All non-disruptive verification gates passed.
        ntfy_tags: white_check_mark
      when: notify_on_success | default(true) | bool
